function renderSell() {
  if(currentUser.role==='owner'){ document.getElementById('sell-container').innerHTML=`<div class="empty-state"><div class="es-icon">🚫</div><h3>Huna Ruhusa</h3><p>Mauzo yanafanywa na wauzaji na Msimamizi Mkuu.</p></div>`; return; }
  const storeSelector = (currentUser.role==='superadmin' && allStores.length>1) ? `<div style="margin-bottom:10px;"><select id="sell-store-filter" onchange="renderCart()" style="width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px;">${allStores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>` : '';
  document.getElementById('sell-container').innerHTML = `${storeSelector}<div style="margin-bottom:12px;"><input class="search-input" type="text" id="drug-search" placeholder="🔍 Tafuta dawa (zilizotolewa POS)..." oninput="searchDrugs(this.value)"></div><div id="drug-results-list"></div><div id="cart-section"></div><div id="customer-section"></div><div id="sell-action-btns"></div>`;
  renderCart();
}
function searchDrugs(query) {
  const el=document.getElementById('drug-results-list');
  let storeId = (currentUser.role==='superadmin' && document.getElementById('sell-store-filter')) ? document.getElementById('sell-store-filter').value : (currentUser.storeId||allStores[0]?.id);
  let myDrugs = allDrugs.filter(d=>d.storeId===storeId && d.issuedToPos && (d.posStock??d.stock)>0);
  if(!query.trim()){ el.innerHTML=''; return; }
  const results=myDrugs.filter(d=>d.name.toLowerCase().includes(query.toLowerCase())||d.category.toLowerCase().includes(query.toLowerCase()));
  if(!results.length){ el.innerHTML=`<div class="empty-state"><p>Hakuna dawa "${query}" — au haijatolewa Store bado</p></div>`; return; }
  el.innerHTML=`<div class="drug-results">${results.map(d=>`<div class="drug-result-item" onclick="addToCart('${d.id}')"><div class="dri-info"><div class="dri-name">${d.name}</div><div class="dri-detail">${d.category} • ${d.unit}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;"><div class="dri-price">TZS ${fmt(d.price)}</div><div class="dri-stock ${(d.posStock??d.stock)<=d.minStock?'low':''}">Stoo: ${d.posStock??d.stock}</div></div></div>`).join('')}</div>`;
}
function addToCart(drugId){
  const drug=allDrugs.find(d=>d.id===drugId); if(!drug) return;
  const avail=drug.posStock??drug.stock; if(avail<=0){ showToast('❌ Dawa imekwisha','error'); return; }
  const existing=cart.find(c=>c.drugId===drugId);
  if(existing){ if(existing.qty>=avail){ showToast('⚠️ Kiasi kinazidi stoo','warning'); return; } existing.qty++; existing.total=existing.qty*existing.price; existing.profit=existing.qty*(existing.price-(existing.buyPrice||0)); }
  else cart.push({ drugId, name:drug.name, price:drug.price, buyPrice:drug.buyPrice||0, qty:1, total:drug.price, profit:drug.price-(drug.buyPrice||0), unit:drug.unit });
  document.getElementById('drug-search').value=''; document.getElementById('drug-results-list').innerHTML=''; renderCart(); showToast(`✅ ${drug.name} imeongezwa`,'success');
}
function updateQty(drugId,val){ const item=cart.find(c=>c.drugId===drugId); const drug=allDrugs.find(d=>d.id===drugId); if(!item||!drug) return; const qty=parseInt(val)||0; if(qty<=0){ removeFromCart(drugId); return; } const avail=drug.posStock??drug.stock; if(qty>avail){ showToast('⚠️ Kiasi kinazidi stoo','warning'); return; } item.qty=qty; item.total=qty*item.price; item.profit=qty*(item.price-(item.buyPrice||0)); renderCart(); }
function removeFromCart(drugId){ cart=cart.filter(c=>c.drugId!==drugId); renderCart(); }
function renderCart(){
  const cartEl=document.getElementById('cart-section'), customerEl=document.getElementById('customer-section'), actionsEl=document.getElementById('sell-action-btns'); if(!cartEl) return;
  const total=cart.reduce((a,b)=>a+b.total,0);
  if(cart.length===0){ cartEl.innerHTML=`<div class="empty-state"><div class="es-icon">🛒</div><h3>Kikapu Kiko Tupu</h3><p>Tafuta dawa hapo juu</p></div>`; customerEl.innerHTML=''; actionsEl.innerHTML=''; return; }
  cartEl.innerHTML=`<div class="cart-section"><h3>🛒 Kikapu (${cart.length} aina)<button class="btn-danger" style="font-size:12px;padding:6px 12px;" onclick="cart=[];renderCart()">Futa Yote</button></h3>${cart.map(item=>`<div class="cart-item"><div class="cart-item-name"><div style="font-weight:600;">${item.name}</div><div style="font-size:11px;color:var(--text3);">TZS ${fmt(item.price)} × kila ${item.unit}</div></div><div class="cart-qty-wrap"><button class="qty-btn" onclick="updateQty('${item.drugId}',${item.qty-1})">−</button><input class="qty-input" type="number" value="${item.qty}" min="1" onchange="updateQty('${item.drugId}',this.value)"><button class="qty-btn" onclick="updateQty('${item.drugId}',${item.qty+1})">+</button></div><div class="cart-item-total">TZS ${fmt(item.total)}</div><button class="cart-remove" onclick="removeFromCart('${item.drugId}')">🗑️</button></div>`).join('')}<div class="cart-footer"><div class="cart-total-label">Jumla ya Kulipa</div><div class="cart-total-val">TZS ${fmt(total)}</div></div></div>`;
  customerEl.innerHTML=`<div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px;"><div style="font-size:13px;font-weight:700;margin-bottom:12px;">Taarifa za Mteja (Si Lazima)</div><div class="field"><label>Jina la Mteja</label><input type="text" id="cust-name" placeholder="Ali Hassan"></div><div class="field"><label>Namba ya Simu</label><input type="tel" id="cust-phone" placeholder="07XXXXXXXX"></div><div class="field"><label>Umri</label><input type="text" id="cust-age" placeholder="35 miaka"></div></div>`;
  actionsEl.innerHTML=`<div class="sell-actions"><button class="btn-primary" onclick="initiateSale(false)">✅ Maliza Mauzo</button><button class="btn-success" onclick="initiateSale(true)">📱 Mauzo + SMS</button></div>`;
}
function initiateSale(sendSMS){
  if(!cart.length){ showToast('⚠️ Kikapu kiko tupu','warning'); return; }
  const custName=document.getElementById('cust-name')?.value.trim()||'', custPhone=document.getElementById('cust-phone')?.value.trim()||'', custAge=document.getElementById('cust-age')?.value.trim()||'';
  if(sendSMS && !custPhone){ showToast('⚠️ Ingiza namba ya simu','warning'); return; }
  const total=cart.reduce((a,b)=>a+b.total,0);
  _pendingSaleData={custName,custPhone,custAge,sendSMS};
  document.getElementById('confirm-amount').textContent=`TZS ${fmt(total)}`;
  document.getElementById('confirm-detail').innerHTML=`<strong>Dawa zifuatazo:</strong><br>${cart.map(c=>`💊 <b>${c.name}</b> × ${c.qty} &nbsp;= TZS ${fmt(c.total)}`).join('<br>')}<br><br>${custName?`👤 Mteja: <b>${custName}</b><br>`:''}${custAge?`🎂 Umri: ${custAge}<br>`:''}${custPhone?`📞 Simu: ${custPhone}<br>`:''}${sendSMS?'<br>📱 <em>SMS itatumwa baada ya mauzo</em>':''}`;
  document.getElementById('confirm-yes-btn').onclick=async()=>{ document.getElementById('sale-confirm-overlay').classList.remove('open'); completeSale(); };
  document.getElementById('sale-confirm-overlay').classList.add('open');
}
function completeSale(){
  if(!_pendingSaleData) return; const {custName,custPhone,custAge,sendSMS}=_pendingSaleData; _pendingSaleData=null;
  if(!cart.length){ showToast('⚠️ Kikapu kiko tupu','warning'); return; }
  const now=new Date(); const saleGroupId='sgrp_'+now.getTime(); const date=now.toISOString().slice(0,10); const time=now.toTimeString().slice(0,5);
  const storeFilter=document.getElementById('sell-store-filter'); const myStoreId=storeFilter?storeFilter.value:(currentUser.storeId||allStores[0]?.id||'s1');
  const sales=[];
  for(const item of cart){
    const drugIdx=allDrugs.findIndex(d=>d.id===item.drugId);
    if(drugIdx>=0){ const d=allDrugs[drugIdx]; const newPosStock=Math.max(0,(d.posStock??d.stock)-item.qty); allDrugs[drugIdx]={...d, posStock:newPosStock, stock:Math.max(0,d.stock-item.qty)}; }
    const profit=(item.price-(item.buyPrice||0))*item.qty;
    sales.push({ id:saleGroupId+'_'+item.drugId, saleGroupId, drugId:item.drugId, drugName:item.name, qty:item.qty, price:item.price, buyPrice:item.buyPrice||0, total:item.total, profit, storeId:myStoreId, sellerId:currentUser.id, sellerName:currentUser.name, date, time, synced:true, customerName:custName, customerPhone:custPhone, customerAge:custAge });
  }
  saveLocal(LS.drugs,allDrugs);
  const existingSales=getLocal(LS.sales)||[]; const newIds=new Set(sales.map(s=>s.id)); const deduped=existingSales.filter(s=>!newIds.has(s.id)); const newAllSales=[...deduped,...sales]; saveLocal(LS.sales,newAllSales); allSales=newAllSales;
  const totalSale=cart.reduce((a,b)=>a+b.total,0); const cartSnapshot=[...cart]; cart=[];
  const drugInfo=cartSnapshot.length===1?`${cartSnapshot[0].name} × ${cartSnapshot[0].qty}`:`${cartSnapshot.length} aina za dawa`;
  document.getElementById('success-drug-info').textContent=drugInfo;
  document.getElementById('success-amount').textContent=`TZS ${fmt(totalSale)}`;
  document.getElementById('success-detail').textContent=custName?`Mteja: ${custName} • ${cartSnapshot.map(c=>c.name).join(', ')}`:cartSnapshot.map(c=>`${c.name} × ${c.qty}`).join(', ');
  window._pendingSMSData=(sendSMS && custPhone)?{ phone:custPhone, receipt:buildReceipt(sales,custName,totalSale,date,time) }:null;
  document.getElementById('success-continue-btn').textContent=(sendSMS && custPhone)?'📱 Endelea & Tuma SMS':'✅ Endelea';
  document.getElementById('success-popup-overlay').classList.add('open');
  renderSell();
}
function closeSuccessPopup(){ document.getElementById('success-popup-overlay').classList.remove('open'); if(window._pendingSMSData){ const {phone,receipt}=window._pendingSMSData; window._pendingSMSData=null; setTimeout(()=>{ window.location.href=`sms:${phone}?body=${encodeURIComponent(receipt)}`; },150); } navigateTo('dashboard'); }
function buildReceipt(sales,custName,total,date,time){ const store=allStores.find(s=>s.id===(currentUser.storeId||sales[0]?.storeId)); let r=`${store?.name||'XYZ Pharmacy'}\nTarehe: ${date} Saa: ${time}\n`; if(custName) r+=`Mteja: ${custName}\n`; r+=`─────────────────\n`; for(const s of sales) r+=`${s.drugName} x${s.qty} = TZS ${fmt(s.total)}\n`; r+=`─────────────────\nJUMLA: TZS ${fmt(total)}\nAsante kwa kununua!\n${store?.name||'XYZ Pharmacy'}`; return r; }

// ==================== STORE PAGE ====================
function renderStore(){
  if(currentUser.role==='seller'){ document.getElementById('inv-container').innerHTML=`<div class="empty-state"><div class="es-icon">🚫</div><h3>Huna Ruhusa</h3><p>Store inashughulikiwa na Admin na Mmiliki tu.</p></div>`; return; }
  const myDrugs=getMyDrugs(); const categories=[...new Set(myDrugs.map(d=>d.category))];
  document.getElementById('inv-container').innerHTML=`<div class="store-section-tag">🏪 Store — Hifadhi ya Dawa</div><div class="action-bar"><input class="search-input" type="text" placeholder="🔍 Tafuta dawa..." oninput="filterDrugs(this.value)" id="inv-search"><button class="btn-add" onclick="showAddDrugModal()"><span>+</span> Sajili</button></div><div class="filter-tabs"><button class="filter-tab active" onclick="filterByCategory('',this)">Zote (${myDrugs.length})</button><button class="filter-tab" onclick="filterByCategory('__issued',this)">✅ POS (${myDrugs.filter(d=>d.issuedToPos).length})</button><button class="filter-tab" onclick="filterByCategory('__notissued',this)">⏳ Haijatolewa (${myDrugs.filter(d=>!d.issuedToPos).length})</button>${categories.map(c=>`<button class="filter-tab" onclick="filterByCategory('${c}',this)">${c}</button>`).join('')}</div><div id="drug-list">${renderDrugList(myDrugs)}</div><div><div style="border-top:1px solid var(--border);padding-top:14px;"><div style="font-size:12px;font-weight:700;margin-bottom:10px;">📤 Export / Import / Backup</div><div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn-add" onclick="exportDrugsCSV()">📥 Export CSV</button><button class="btn-add" style="background:var(--accent);" onclick="document.getElementById('import-csv-input').click()">📤 Import CSV</button><input type="file" id="import-csv-input" accept=".csv,.json" style="display:none;" onchange="importDrugsCSV(event)"><button class="btn-add" style="background:var(--warning);" onclick="doBackup()">💾 Backup</button><button class="btn-add" style="background:var(--profit);" onclick="document.getElementById('restore-input').click()">♻️ Restore</button><input type="file" id="restore-input" accept=".json" style="display:none;" onchange="doRestore(event)"></div></div></div>`;
}
function renderDrugList(drugs){ if(!drugs.length) return `<div class="empty-state"><div class="es-icon">💊</div><h3>Hakuna Dawa</h3><p>Bonyeza + Sajili kuongeza dawa mpya</p></div>`; const canEdit=currentUser.role!=='seller'; return drugs.map(d=>{ const profit=d.price-(d.buyPrice||0); const margin=d.price>0?Math.round((profit/d.price)*100):0; const posStk=d.posStock??d.stock; return `<div class="drug-card"><div class="drug-card-top"><div class="drug-card-icon">💊</div><div class="drug-card-info"><div class="drug-card-name">${d.name}</div><div class="drug-card-cat">${d.category}</div></div><div class="drug-card-actions">${d.issuedToPos?`<span class="issued-badge">✅ POS</span>`:`<button class="issue-btn" onclick="issueDrugToPos('${d.id}')">📤 Toa POS</button>`}${canEdit?`<button class="icon-btn" onclick="showEditDrugModal('${d.id}')">✏️</button><button class="icon-btn danger" onclick="confirmDeleteDrug('${d.id}')">🗑️</button>`:''}</div></div><div class="drug-card-stats"><div class="drug-stat"><div class="drug-stat-val" style="color:${posStk<=(d.minStock||10)?'var(--danger)':'var(--accent)'};">${posStk} <span style="font-size:10px;">${d.unit}</span></div><div class="drug-stat-label">POS Stoo</div></div><div class="drug-stat"><div class="drug-stat-val">${d.stock}</div><div class="drug-stat-label">Store Stoo</div></div><div class="drug-stat"><div class="drug-stat-val">TZS ${fmt(d.price)}</div><div class="drug-stat-label">Bei Uza</div></div><div class="drug-stat"><div class="drug-stat-val" style="color:var(--profit);">TZS ${fmt(profit)} <span style="font-size:10px;">(${margin}%)</span></div><div class="drug-stat-label">Faida/Kipande</div></div></div></div>`; }).join(''); }
function issueDrugToPos(id){ const d=allDrugs.find(x=>x.id===id); if(!d) return; openModal('📤 Toa Dawa kwa POS',`<p>Toa <strong>${d.name}</strong> kwenda POS.</p><div class="field"><label>Kiasi cha Kutoa (max: ${d.stock})</label><input type="number" id="issue-qty" value="${d.stock}" min="1" max="${d.stock}"></div>`,[{label:'📤 Toa Kwenda POS', style:'primary', action:()=>{ const qty=parseInt(document.getElementById('issue-qty')?.value)||0; if(qty<=0||qty>d.stock){ showToast('⚠️ Kiasi si sahihi','warning'); return; } const idx=allDrugs.findIndex(x=>x.id===id); allDrugs[idx]={...allDrugs[idx], issuedToPos:true, posStock:qty }; saveLocal(LS.drugs,allDrugs); closeModal(); renderStore(); showToast(`✅ ${d.name} imetolewa kwa POS — Kiasi: ${qty}`,'success'); }},{label:'Hapana', style:'outline', action:closeModal}]); }
function filterDrugs(query){ const myDrugs=getMyDrugs(); const filtered=myDrugs.filter(d=>d.name.toLowerCase().includes(query.toLowerCase())||d.category.toLowerCase().includes(query.toLowerCase())); document.getElementById('drug-list').innerHTML=renderDrugList(filtered); }
function filterByCategory(cat,btn){ document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); const myDrugs=getMyDrugs(); let filtered=myDrugs; if(cat==='__issued') filtered=myDrugs.filter(d=>d.issuedToPos); else if(cat==='__notissued') filtered=myDrugs.filter(d=>!d.issuedToPos); else if(cat) filtered=myDrugs.filter(d=>d.category===cat); document.getElementById('drug-list').innerHTML=renderDrugList(filtered); }
function showAddDrugModal(){ if(currentUser.role==='seller'){ showToast('❌ Muuzaji haruhusiwi kusajili dawa','error'); return; } const stores=currentUser.role==='superadmin'?allStores:allStores.filter(s=>s.id===currentUser.storeId); openModal('💊 Sajili Dawa Mpya',`<div class="field"><label>Jina la Dawa</label><input id="f-dname"></div><div class="form-row"><div class="field"><label>Aina</label><input id="f-dcat" list="cat-list"><datalist id="cat-list"><option>Maumivu</option><option>Antibiotiki</option><option>Malaria</option><option>Vitamini</option></datalist></div><div class="field"><label>Kipimo</label><input id="f-dunit" placeholder="kibao/pakiti"></div></div><div class="form-row"><div class="field"><label>Bei ya Kununua</label><input id="f-dbuyprice" type="number" oninput="updateProfitPreview()"></div><div class="field"><label>Bei ya Kuuza</label><input id="f-dprice" type="number" oninput="updateProfitPreview()"></div></div><div class="form-row"><div class="field"><label>Kiasi</label><input id="f-dstock" type="number"></div><div class="field"><label>Alert</label><input id="f-dmin" type="number" value="10"></div></div><div id="profit-preview" style="background:rgba(124,58,237,.08);padding:12px;border-radius:10px;margin-bottom:12px;display:none;">💹 Faida kwa kipande: TZS <span id="profit-preview-val">0</span> &nbsp;|&nbsp; Margin: <span id="margin-preview-val">0</span>%</div>${stores.length>1?`<div class="field"><label>Duka</label><select id="f-dstore">${stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>`:`<input type="hidden" id="f-dstore" value="${stores[0]?.id||'s1'}">`}`,[{label:'Sajili Dawa', style:'primary', action:()=>saveDrug()}]); }
function updateProfitPreview(){ const b=parseFloat(document.getElementById('f-dbuyprice')?.value)||0; const s=parseFloat(document.getElementById('f-dprice')?.value)||0; const prev=document.getElementById('profit-preview'); if(!prev) return; if(b>0||s>0){ prev.style.display='block'; document.getElementById('profit-preview-val').textContent=fmt(s-b); document.getElementById('margin-preview-val').textContent=s>0?Math.round(((s-b)/s)*100):0; }else prev.style.display='none'; }
function showEditDrugModal(id){ if(currentUser.role==='seller'){ showToast('❌ Muuzaji haruhusiwi kubadilisha dawa','error'); return; } const d=allDrugs.find(x=>x.id===id); if(!d) return; openModal('✏️ Hariri Dawa',`<div class="field"><label>Jina</label><input id="f-dname" value="${d.name}"></div><div class="field"><label>Aina</label><input id="f-dcat" value="${d.category}"></div><div class="field"><label>Kipimo</label><input id="f-dunit" value="${d.unit}"></div><div class="form-row"><div class="field"><label>Bei Kununua</label><input id="f-dbuyprice" type="number" value="${d.buyPrice||0}"></div><div class="field"><label>Bei Kuuza</label><input id="f-dprice" type="number" value="${d.price}"></div></div><div class="form-row"><div class="field"><label>Kiasi Store</label><input id="f-dstock" type="number" value="${d.stock}"></div><div class="field"><label>Alert</label><input id="f-dmin" type="number" value="${d.minStock||10}"></div></div><input type="hidden" id="f-dstore" value="${d.storeId}"><input type="hidden" id="f-dedit-id" value="${d.id}">`,[{label:'Hifadhi', style:'primary', action:()=>saveDrug(true)}]); }
function saveDrug(isEdit=false){ if(currentUser.role==='seller') return; const name=document.getElementById('f-dname')?.value.trim(); const cat=document.getElementById('f-dcat')?.value.trim(); const unit=document.getElementById('f-dunit')?.value.trim(); const buyPrice=parseFloat(document.getElementById('f-dbuyprice')?.value)||0; const price=parseFloat(document.getElementById('f-dprice')?.value)||0; const stock=parseInt(document.getElementById('f-dstock')?.value)||0; const minStock=parseInt(document.getElementById('f-dmin')?.value)||10; const storeId=document.getElementById('f-dstore')?.value; if(!name||!cat||!unit){ showToast('⚠️ Jaza sehemu zote','warning'); return; } if(isEdit){ const id=document.getElementById('f-dedit-id')?.value; const idx=allDrugs.findIndex(d=>d.id===id); if(idx>=0) allDrugs[idx]={...allDrugs[idx], name, category:cat, unit, buyPrice, price, stock, minStock}; }else{ const newDrug={ id:'drug_'+Date.now(), name, category:cat, unit, buyPrice, price, stock, posStock:0, minStock, storeId, issuedToPos:false }; allDrugs.push(newDrug); } saveLocal(LS.drugs,allDrugs); showToast(isEdit?'✅ Dawa imebadilishwa!':'✅ Dawa mpya imesajiliwa!','success'); closeModal(); renderStore(); }
function confirmDeleteDrug(id){ if(currentUser.role==='seller') return; const d=allDrugs.find(x=>x.id===id); if(!d) return; openModal('🗑️ Futa Dawa',`<p>Una uhakika kufuta <strong>${d.name}</strong>?</p>`,[{label:'Ndio, Futa', style:'danger', action:()=>{ allDrugs=allDrugs.filter(x=>x.id!==id); saveLocal(LS.drugs,allDrugs); closeModal(); renderStore(); showToast('🗑️ Dawa imefutwa','success'); }},{label:'Hapana', style:'outline', action:closeModal}]); }
function exportDrugsCSV(){ const myDrugs=getMyDrugs(); const header='Jina,Category,Kipimo,Bei_Nunua,Bei_Uza,Kiasi_Store,Kiasi_POS,Alert,Faida_Kipande\n'; const rows=myDrugs.map(d=>`"${d.name}","${d.category}","${d.unit}",${d.buyPrice||0},${d.price},${d.stock},${d.posStock??d.stock},${d.minStock||10},${d.price-(d.buyPrice||0)}`).join('\n'); const blob=new Blob([header+rows],{type:'text/csv'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`dawa_${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(url); showToast('📥 Export imefanikiwa','success'); }
function importDrugsCSV(event){ const file=event.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=(e)=>{ try{ const text=e.target.result; const lines=text.trim().split('\n').slice(1); let added=0; const myStoreId=currentUser.storeId||allStores[0]?.id||'s1'; for(const line of lines){ const cols=line.split(',').map(c=>c.replace(/^"|"$/g,'').trim()); if(!cols[0]) continue; allDrugs.push({ id:'drug_imp_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), name:cols[0], category:cols[1]||'Jumla', unit:cols[2]||'kipande', buyPrice:parseFloat(cols[3])||0, price:parseFloat(cols[4])||0, stock:parseInt(cols[5])||0, posStock:parseInt(cols[6])||0, minStock:parseInt(cols[7])||10, storeId:myStoreId, issuedToPos:false }); added++; } saveLocal(LS.drugs,allDrugs); renderStore(); showToast(`✅ Dawa ${added} zimeingizwa`,'success'); }catch(err){ showToast('❌ Hitilafu CSV','error'); } event.target.value=''; }; reader.readAsText(file); }
function doBackup(){ const backup={ version:'4.0', timestamp:new Date().toISOString(), users:allUsers, stores:allStores, drugs:allDrugs, sales:allSales, returns:allReturns, reminders:allReminders }; const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`xyz_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url); showToast('💾 Backup imeshuka','success'); }
function doRestore(event){ const file=event.target.files[0]; if(!file) return; openModal('♻️ Thibitisha Restore','<p style="color:var(--danger);">Tahadhari! Hii itafuta data zako za sasa.</p>',[{label:'Ndio, Restore', style:'danger', action:()=>{ const reader=new FileReader(); reader.onload=(e)=>{ try{ const data=JSON.parse(e.target.result); if(data.users){ saveLocal(LS.users,data.users); allUsers=data.users; } if(data.stores){ saveLocal(LS.stores,data.stores); allStores=data.stores; } if(data.drugs){ saveLocal(LS.drugs,data.drugs); allDrugs=data.drugs; } if(data.sales){ saveLocal(LS.sales,data.sales); allSales=data.sales; } if(data.returns){ saveLocal(LS.returns,data.returns); allReturns=data.returns; } if(data.reminders){ saveLocal(LS.reminders,data.reminders); allReminders=data.reminders; } closeModal(); renderStore(); showToast('✅ Restore imefanikiwa','success'); }catch(err){ showToast('❌ Faili si sahihi','error'); } }; reader.readAsText(file); event.target.value=''; } },{label:'Hapana', style:'outline', action:()=>{ closeModal(); event.target.value=''; } }]); }

// ==================== REPORTS ====================
function renderReports(){ const today=new Date().toISOString().slice(0,10); document.getElementById('report-container').innerHTML=`<div class="date-filter"><input class="date-input" type="date" id="rpt-from" value="${today}"><input class="date-input" type="date" id="rpt-to" value="${today}"><button class="btn-add" onclick="loadReport()">🔍 Angalia</button></div><div id="report-content"></div>`; loadReport(); }
function loadReport(){ const from=document.getElementById('rpt-from')?.value, to=document.getElementById('rpt-to')?.value; if(!from||!to) return; const u=currentUser, myStores=getMyStores(); let filtered=allSales.filter(s=>s.date>=from&&s.date<=to); if(u.role!=='superadmin') filtered=filtered.filter(s=>myStores.includes(s.storeId)); if(u.role==='seller') filtered=filtered.filter(s=>s.sellerId===u.id); const totalAmt=filtered.reduce((a,b)=>a+(b.total||0),0); const totalTx=filtered.length; const totalProfit=filtered.reduce((a,b)=>a+(b.profit||0),0); const canSeeProfit=u.role!=='seller'; document.getElementById('report-content').innerHTML=`<div class="report-summary"><div class="rsummary-item"><div class="rsummary-val">TZS ${fmt(totalAmt)}</div><div class="rsummary-label">Jumla Mauzo</div></div><div class="rsummary-item"><div class="rsummary-val">${totalTx}</div><div class="rsummary-label">Miamala</div></div></div>${canSeeProfit?`<div style="background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:var(--radius);padding:14px;margin-bottom:16px;color:#fff;"><div>💹 Faida Yote: TZS ${fmt(totalProfit)}</div><div>Margin: ${totalAmt>0?Math.round((totalProfit/totalAmt)*100):0}%</div></div>`:''}<div class="report-table-wrap"><h3>📋 Kumbukumbu za Mauzo</h3>${filtered.length===0?`<div class="empty-state"><p>Hakuna mauzo</p></div>`:filtered.slice().reverse().map(s=>`<div class="report-entry"><div class="re-info"><div class="re-drug">${s.drugName}</div><div class="re-meta">${s.qty} × TZS ${fmt(s.price)} &nbsp;• ${s.date} ${s.time}</div></div><div class="re-amount">TZS ${fmt(s.total)}</div></div>`).join('')}</div>`; }

// ==================== RETURNS ====================
function renderReturns(){ const myReturns=currentUser.role==='superadmin'?allReturns:allReturns.filter(r=>r.storeId===currentUser.storeId); document.getElementById('return-container').innerHTML=`<div style="padding:16px;"><button class="btn-add" style="width:100%;margin-bottom:16px;" onclick="showReturnModal()">+ Ingiza Rejeshi</button><div class="recent-card"><h3>↩️ Historia ya Rejeshi (${myReturns.length})</h3>${myReturns.length===0?`<div class="empty-state"><p>Hakuna rejeshi</p></div>`:myReturns.slice().reverse().map(r=>`<div class="sale-item"><div class="sale-dot">↩️</div><div class="sale-info"><div class="sale-name">${r.drugName}</div><div class="sale-meta">Idadi: ${r.qty} • Sababu: ${r.reason} • ${r.date}</div></div><div style="color:var(--danger);">-TZS ${fmt(r.total)}</div></div>`).join('')}</div></div>`; }
function showReturnModal(){ const myDrugs=getMyDrugs().filter(d=>d.issuedToPos); openModal('↩️ Rejeshi la Dawa',`<div class="field"><label>Dawa</label><select id="ret-drug">${myDrugs.map(d=>`<option value="${d.id}">${d.name} (Stoo: ${d.posStock??d.stock})</option>`).join('')}</select></div><div class="field"><label>Idadi</label><input type="number" id="ret-qty" value="1"></div><div class="field"><label>Sababu</label><select id="ret-reason"><option>Dawa mbaya</option><option>Imepewa makosa</option><option>Nyingine</option></select></div>`,[{label:'Hifadhi Rejeshi', style:'primary', action:saveReturn}]); }
function saveReturn(){ const drugId=document.getElementById('ret-drug')?.value; const qty=parseInt(document.getElementById('ret-qty')?.value)||0; const reason=document.getElementById('ret-reason')?.value; if(!drugId||qty<=0){ showToast('⚠️ Chagua dawa na idadi','warning'); return; } const drug=allDrugs.find(d=>d.id===drugId); if(!drug) return; const now=new Date(); const returnEntry={ id:'ret_'+now.getTime(), drugId, drugName:drug.name, qty, price:drug.price, total:drug.price*qty, reason, storeId:currentUser.storeId||drug.storeId, sellerId:currentUser.id, sellerName:currentUser.name, date:now.toISOString().slice(0,10), time:now.toTimeString().slice(0,5) }; const idx=allDrugs.findIndex(d=>d.id===drugId); if(idx>=0){ allDrugs[idx]={...allDrugs[idx], stock:allDrugs[idx].stock+qty, posStock:(allDrugs[idx].posStock??allDrugs[idx].stock)+qty }; } saveLocal(LS.drugs,allDrugs); allReturns.push(returnEntry); saveLocal(LS.returns,allReturns); let qtyToReduce=qty; for(let i=allSales.length-1;i>=0&&qtyToReduce>0;i--){ if(allSales[i].drugId===drugId){ const s=allSales[i]; if(s.qty<=qtyToReduce){ qtyToReduce-=s.qty; allSales.splice(i,1); }else{ const newQty=s.qty-qtyToReduce; const profitPerUnit=(s.price||0)-(s.buyPrice||0); allSales[i]={...s,qty:newQty,total:newQty*s.price,profit:newQty*profitPerUnit}; qtyToReduce=0; } } } saveLocal(LS.sales,allSales); closeModal(); showToast(`✅ Rejeshi la ${drug.name} limehifadhiwa`,'success'); renderReturns(); }

// ==================== REMINDERS ====================
function renderReminders(){ const myReminders=currentUser.role==='superadmin'?allReminders:allReminders.filter(r=>r.storeId===currentUser.storeId); document.getElementById('reminder-container').innerHTML=`<div class="admin-section"><div class="admin-section-header"><h3>🔔 Kumbushisho za Dawa</h3><button class="btn-add" onclick="showAddReminderModal()">+ Ongeza</button></div>${myReminders.length===0?`<div class="empty-state"><p>Hakuna kumbusho</p></div>`:myReminders.slice().reverse().map(r=>`<div class="admin-item"><div class="admin-item-avatar" style="background:${r.sent?'var(--accent)':'var(--warning)'};">🔔</div><div class="admin-item-info"><div class="admin-item-name">${r.patientName}</div><div class="admin-item-sub">💊 ${r.drugName} • ${r.instructions||''}</div><div class="admin-item-sub">📞 ${r.phone} • ${r.date}</div></div><div class="admin-item-actions">${!r.sent?`<button class="icon-btn" onclick="sendReminderSMS('${r.id}')">📱</button>`:''}<button class="icon-btn danger" onclick="deleteReminder('${r.id}')">🗑️</button></div></div>`).join('')}</div>`; }
function showAddReminderModal(){ openModal('🔔 Ongeza Kumbushisho',`<div class="field"><label>Jina la Mgonjwa</label><input id="rem-name"></div><div class="field"><label>Namba ya Simu</label><input id="rem-phone"></div><div class="field"><label>Dawa</label><input id="rem-drug"></div><div class="field"><label>Maelekezo</label><textarea id="rem-instr"></textarea></div>`,[{label:'Hifadhi', style:'primary', action:saveReminder}]); }
function saveReminder(){ const name=document.getElementById('rem-name')?.value.trim(); const phone=document.getElementById('rem-phone')?.value.trim(); const drug=document.getElementById('rem-drug')?.value.trim(); const instr=document.getElementById('rem-instr')?.value.trim(); if(!name||!phone||!drug){ showToast('⚠️ Jaza sehemu zote','warning'); return; } const r={ id:'rem_'+Date.now(), patientName:name, phone, drugName:drug, instructions:instr||'', date:new Date().toISOString().slice(0,10), storeId:currentUser.storeId||'s1', sellerId:currentUser.id, sent:false }; allReminders.push(r); saveLocal(LS.reminders,allReminders); closeModal(); renderReminders(); showToast('✅ Kumbushisho limehifadhiwa','success'); }
function sendReminderSMS(id){ const r=allReminders.find(x=>x.id===id); if(!r) return; const store=allStores.find(s=>s.id===currentUser.storeId)||allStores[0]; const msg=`Kumbushisho la Dawa\nMgonjwa: ${r.patientName}\nDawa: ${r.drugName}\nMaelekezo: ${r.instructions}\n- ${store?.name||'XYZ Pharmacy'}`; window.location.href=`sms:${r.phone}?body=${encodeURIComponent(msg)}`; const idx=allReminders.findIndex(x=>x.id===id); if(idx>=0){ allReminders[idx].sent=true; saveLocal(LS.reminders,allReminders); renderReminders(); } }
function deleteReminder(id){ allReminders=allReminders.filter(x=>x.id!==id); saveLocal(LS.reminders,allReminders); renderReminders(); showToast('🗑️ Kumbushisho limefutwa','success'); }

// ==================== ADMIN PAGE ====================
function renderAdmin(){ if(currentUser.role==='superadmin') renderSuperAdmin(); else if(currentUser.role==='owner') renderOwnerAdmin(); else document.getElementById('admin-container').innerHTML='<div class="empty-state"><h3>Huna Ruhusa</h3></div>'; }
function renderSuperAdmin(){ const totalSales=allSales.reduce((a,b)=>a+b.total,0); const totalProfit=allSales.reduce((a,b)=>a+(b.profit||0),0); const today=new Date().toISOString().slice(0,10); const todayTotal=allSales.filter(s=>s.date===today).reduce((a,b)=>a+b.total,0); const todayProfit=allSales.filter(s=>s.date===today).reduce((a,b)=>a+(b.profit||0),0); const drugSales={}; for(const s of allSales) drugSales[s.drugName]=(drugSales[s.drugName]||0)+s.qty; const topDrugs=Object.entries(drugSales).sort((a,b)=>b[1]-a[1]).slice(0,5); document.getElementById('admin-container').innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="stat-value">${allStores.length}</div><div class="stat-label">Maduka</div></div><div class="stat-card"><div class="stat-value">${allUsers.filter(u=>u.role!=='superadmin').length}</div><div class="stat-label">Watumiaji</div></div><div class="stat-card"><div class="stat-value">TZS ${fmt(todayTotal)}</div><div class="stat-label">Mauzo Leo</div></div><div class="stat-card profit"><div class="stat-value">TZS ${fmt(todayProfit)}</div><div class="stat-label">Faida Leo</div></div></div><div class="profit-card"><h3>💹 Faida Yote</h3><div class="profit-val">TZS ${fmt(totalProfit)}</div><div class="profit-sub">Jumla Mauzo: TZS ${fmt(totalSales)} | Margin: ${totalSales>0?Math.round((totalProfit/totalSales)*100):0}%</div></div><div class="admin-section"><div class="admin-section-header"><h3>🏪 Maduka (${allStores.length})</h3><button class="btn-add" onclick="showAddStoreModal()">+ Duka</button></div>${allStores.map(s=>{ const owner=allUsers.find(u=>u.id===s.ownerId); return `<div class="admin-item"><div class="admin-item-avatar" style="background:var(--navy);">🏪</div><div class="admin-item-info"><div class="admin-item-name">${s.name}</div><div class="admin-item-sub">${s.location} • Mmiliki: ${owner?.name||'-'}</div></div><div class="admin-item-actions"><button class="icon-btn danger" onclick="deleteStore('${s.id}')">🗑️</button></div></div>`; }).join('')||'<div class="empty-state"><p>Hakuna maduka</p></div>'}</div><div class="admin-section"><div class="admin-section-header"><h3>👥 Watumiaji</h3><button class="btn-add" onclick="showAddUserModal()">+ Mtumiaji</button></div>${allUsers.filter(u=>u.role!=='superadmin').map(u=>renderUserItem(u)).join('')}</div><div class="admin-section"><div class="admin-section-header"><h3>🔥 Dawa Zinazouzwa Zaidi</h3></div>${topDrugs.map(([name,qty],i)=>`<div class="admin-item"><div class="admin-item-avatar" style="background:var(--accent);">${i+1}</div><div class="admin-item-info"><div class="admin-item-name">${name}</div><div class="admin-item-sub">Imeuzwa: ${qty} vipande</div></div></div>`).join('')||'<div class="empty-state"><p>Hakuna data</p></div>'}</div>`; }
function renderOwnerAdmin(){ const myStore=allStores.find(s=>s.id===currentUser.storeId); const mySellers=allUsers.filter(u=>u.storeId===currentUser.storeId&&u.role==='seller'); const myStoreSales=allSales.filter(s=>s.storeId===currentUser.storeId); const totalProfit=myStoreSales.reduce((a,b)=>a+(b.profit||0),0); const totalSales=myStoreSales.reduce((a,b)=>a+(b.total||0),0); const margin=totalSales>0?Math.round((totalProfit/totalSales)*100):0; document.getElementById('admin-container').innerHTML=`<div class="profit-card"><h3>💹 Faida ya Duka Langu</h3><div class="profit-val">TZS ${fmt(totalProfit)}</div><div class="profit-sub">Mauzo Yote: TZS ${fmt(totalSales)} | Margin: ${margin}%</div></div><div class="admin-section"><div class="admin-section-header"><h3>🏪 Duka Langu</h3></div>${myStore?`<div class="admin-item"><div class="admin-item-avatar">🏪</div><div class="admin-item-info"><div class="admin-item-name">${myStore.name}</div><div class="admin-item-sub">${myStore.location}</div></div></div>`:'<div class="empty-state"><p>Hakuna duka</p></div>'}</div><div class="admin-section"><div class="admin-section-header"><h3>👥 Wauzaji (${mySellers.length})</h3><button class="btn-add" onclick="showAddUserModal()">+ Muuzaji</button></div>${mySellers.length===0?`<div class="empty-state"><p>Haujaweka wauzaji</p></div>`:mySellers.map(u=>renderUserItem(u)).join('')}</div>`; }
function renderUserItem(u){ const store=allStores.find(s=>s.id===u.storeId); return `<div class="admin-item"><div class="admin-item-avatar" style="background:${u.role==='owner'?'var(--warning)':'var(--accent)'};">${u.name.charAt(0)}</div><div class="admin-item-info"><div class="admin-item-name">${u.name}</div><div class="admin-item-sub">${u.role==='owner'?'Mmiliki':'Muuzaji'} • @${u.username} • ${store?.name||'Mfumo Wote'}</div></div><div class="admin-item-actions"><button class="icon-btn" onclick="editUser('${u.id}')">✏️</button><button class="icon-btn danger" onclick="deleteUser('${u.id}')">🗑️</button></div></div>`; }
function showAddStoreModal(){ const owners=allUsers.filter(u=>u.role==='owner'); openModal('🏪 Ongeza Duka',`<div class="field"><label>Jina la Duka</label><input id="store-name"></div><div class="field"><label>Mahali</label><input id="store-loc"></div><div class="field"><label>Mmiliki</label><select id="store-owner">${owners.map(o=>`<option value="${o.id}">${o.name}</option>`).join('')}</select></div>`,[{label:'Hifadhi', style:'primary', action:()=>{ const name=document.getElementById('store-name').value.trim(); const loc=document.getElementById('store-loc').value.trim(); const ownerId=document.getElementById('store-owner').value; if(!name||!loc){ showToast('⚠️ Jaza jina na mahali','warning'); return; } const newStore={ id:'store_'+Date.now(), name, location:loc, ownerId }; allStores.push(newStore); saveLocal(LS.stores,allStores); closeModal(); renderAdmin(); showToast('✅ Duka limeongezwa','success'); } }]); }
function deleteStore(id){ openModal('🗑️ Futa Duka','<p>Una uhakika? Data zote za duka hili zitaathirika.</p>',[{label:'Ndio, Futa', style:'danger', action:()=>{ allStores=allStores.filter(s=>s.id!==id); saveLocal(LS.stores,allStores); closeModal(); renderAdmin(); showToast('🗑️ Duka limefutwa','success'); }},{label:'Hapana', style:'outline', action:closeModal}]); }
function showAddUserModal(){ const isOwner=currentUser.role==='owner'; const stores=isOwner?allStores.filter(s=>s.id===currentUser.storeId):allStores; const roles=isOwner?[{v:'seller',l:'Muuzaji'}]:[{v:'owner',l:'Mmiliki'},{v:'seller',l:'Muuzaji'}]; openModal('👤 Ongeza Mtumiaji',`<div class="field"><label>Jina Kamili</label><input id="user-name"></div><div class="field"><label>Jina la Kuingia</label><input id="user-username"></div><div class="field"><label>Nywila</label><input id="user-password" type="password"></div><div class="field"><label>Namba ya Simu</label><input id="user-phone"></div>${!isOwner?`<div class="field"><label>Cheo</label><select id="user-role">${roles.map(r=>`<option value="${r.v}">${r.l}</option>`).join('')}</select></div>`:`<input type="hidden" id="user-role" value="seller">`}<div class="field"><label>Duka</label><select id="user-store">${stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>`,[{label:'Ongeza', style:'primary', action:()=>{ const name=document.getElementById('user-name').value.trim(); const username=document.getElementById('user-username').value.trim(); const password=document.getElementById('user-password').value.trim(); const phone=document.getElementById('user-phone').value.trim(); const role=document.getElementById('user-role')?.value||'seller'; const storeId=document.getElementById('user-store').value; if(!name||!username||!password){ showToast('⚠️ Jaza jina, username na nywila','warning'); return; } if(allUsers.find(u=>u.username===username)){ showToast('❌ Username tayari ipo','error'); return; } const newUser={ id:'user_'+Date.now(), name, username, password, role, storeId, phone }; allUsers.push(newUser); saveLocal(LS.users,allUsers); closeModal(); renderAdmin(); showToast(`✅ Mtumiaji ${name} ameongezwa`,'success'); } }]); }
function editUser(id){ const u=allUsers.find(x=>x.id===id); if(!u) return; openModal('✏️ Hariri Mtumiaji',`<div class="field"><label>Jina</label><input id="edit-name" value="${u.name}"></div><div class="field"><label>Simu</label><input id="edit-phone" value="${u.phone||''}"></div><div class="field"><label>Nywila Mpya (acha tupu)</label><input id="edit-password" type="password"></div>`,[{label:'Hifadhi', style:'primary', action:()=>{ u.name=document.getElementById('edit-name').value.trim(); u.phone=document.getElementById('edit-phone').value.trim(); if(document.getElementById('edit-password').value.trim()) u.password=document.getElementById('edit-password').value.trim(); saveLocal(LS.users,allUsers); closeModal(); renderAdmin(); showToast('✅ Mtumiaji amebadilishwa','success'); } }]); }
function deleteUser(id){ const u=allUsers.find(x=>x.id===id); if(!u) return; openModal('🗑️ Futa Mtumiaji',`<p>Una uhakika kufuta ${u.name}?</p>`,[{label:'Ndio, Futa', style:'danger', action:()=>{ allUsers=allUsers.filter(x=>x.id!==id); saveLocal(LS.users,allUsers); closeModal(); renderAdmin(); showToast('🗑️ Mtumiaji amefutwa','success'); }},{label:'Hapana', style:'outline', action:closeModal}]); }

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
  loadAllData();
  const savedSession = getLocal(LS.session);
  const loader = document.getElementById('app-loader');
  if(loader){ loader.style.opacity='0'; setTimeout(()=>loader.style.display='none',500); }
  if(savedSession && allUsers.find(u=>u.id===savedSession.id)){
    currentUser = allUsers.find(u=>u.id===savedSession.id);
    document.getElementById('login-screen').classList.remove('active');
    document.getElementById('main-screen').classList.add('active');
    setupUI(); navigateTo('dashboard');
  } else { document.getElementById('login-screen').classList.add('active'); }
  document.getElementById('login-password').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('login-username').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('login-password').focus(); });
});
</script>
</body>
