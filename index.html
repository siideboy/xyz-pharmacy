<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XYZ Pharmacy Management - Safi</title>
<meta name="theme-color" content="#0f4c81">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* [Mfumo wako wote wa CSS hapa - ukaacha sawa] */
:root {
  --navy: #0f4c81;
  --navy-dark: #0a3460;
  --navy-light: #1a6bb5;
  --accent: #00c896;
  --accent-dark: #00a87e;
  --danger: #e63946;
  --warning: #f4a261;
  --profit: #7c3aed;
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #e2e8f0;
  --text: #1a202c;
  --text2: #4a5568;
  --text3: #94a3b8;
  --shadow: 0 2px 12px rgba(15,76,129,0.10);
  --shadow-lg: 0 8px 32px rgba(15,76,129,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);}
#app-loader{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
#app-loader .logo-icon{font-size:64px;animation:pulse 1.5s infinite;}
#app-loader h1{color:#fff;font-size:22px;font-weight:700;margin-top:16px;}
#app-loader p{color:rgba(255,255,255,.6);font-size:13px;margin-top:8px;}
#app-loader .loader-bar{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:10px;margin-top:24px;overflow:hidden;}
#app-loader .loader-fill{height:100%;background:var(--accent);border-radius:10px;animation:load 1.2s ease-in-out forwards;}
@keyframes load{0%{width:0%}100%{width:100%}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.screen{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;}
.screen.active{display:flex;}
#login-screen{background:linear-gradient(160deg,var(--navy-dark) 0%,var(--navy) 50%,var(--navy-light) 100%);align-items:center;justify-content:center;padding:24px;}
.login-card{width:100%;max-width:400px;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:40px 32px;animation:slideUp .5s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .icon{font-size:56px;display:block;}
.login-logo h1{color:#fff;font-size:24px;font-weight:800;margin-top:12px;}
.login-logo p{color:rgba(255,255,255,.6);font-size:13px;margin-top:4px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;color:rgba(255,255,255,.8);font-size:13px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px;}
.form-group input{width:100%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:12px;padding:14px 16px;color:#fff;font-size:16px;font-family:inherit;transition:.2s;outline:none;}
.form-group input::placeholder{color:rgba(255,255,255,.4);}
.form-group input:focus{border-color:var(--accent);background:rgba(255,255,255,.18);}
.btn-login{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s;margin-top:8px;}
.btn-login:active{transform:scale(.98);background:var(--accent-dark);}
.login-help{text-align:center;margin-top:20px;color:rgba(255,255,255,.5);font-size:12px;line-height:1.7;}
.login-help strong{color:rgba(255,255,255,.8);}
#main-screen{background:var(--bg);}
.topbar{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-left .menu-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:38px;height:38px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;backdrop-filter:blur(4px);}
.sidebar-overlay.open{display:block;}
.sidebar{position:fixed;left:-280px;top:0;bottom:0;width:280px;background:var(--navy-dark);z-index:201;transition:left .3s ease;overflow-y:auto;display:flex;flex-direction:column;}
.sidebar.open{left:0;}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-user{display:flex;align-items:center;gap:14px;}
.sidebar-avatar{width:48px;height:48px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;}
.sidebar-name{color:#fff;font-size:15px;font-weight:700;}
.sidebar-role{color:rgba(255,255,255,.5);font-size:12px;margin-top:2px;}
.sidebar-nav{flex:1;padding:16px 12px;}
.nav-section{margin-bottom:8px;}
.nav-section-title{color:rgba(255,255,255,.3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 10px 6px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;color:rgba(255,255,255,.7);font-size:14px;font-weight:500;cursor:pointer;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.1);color:#fff;}
.nav-item .nav-icon{font-size:20px;width:24px;text-align:center;}
.sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,.08);}
.page{display:none;flex-direction:column;flex:1;padding:0 0 80px 0;}
.page.active{display:flex;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;color:var(--text3);transition:.15s;border:none;background:none;font-family:inherit;}
.bottom-nav-item.active{color:var(--navy);}
.bottom-nav-item .bnav-icon{font-size:22px;line-height:1;}
.bottom-nav-item .bnav-label{font-size:10px;font-weight:600;margin-top:3px;}
.dash-scroll{padding:16px;overflow-y:auto;flex:1;}
.dash-greeting{background:linear-gradient(135deg,var(--navy),var(--navy-light));border-radius:20px;padding:20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
.dash-greeting::after{content:'💊';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:56px;opacity:.15;}
.dash-greeting h2{font-size:20px;font-weight:800;}
.dash-greeting p{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px;}
.dash-greeting .dash-date{font-size:12px;color:rgba(255,255,255,.5);margin-top:8px;display:flex;align-items:center;gap:6px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);}
.stat-card .stat-icon{font-size:28px;margin-bottom:8px;}
.stat-card .stat-value{font-size:20px;font-weight:800;color:var(--navy);font-family:'JetBrains Mono',monospace;}
.stat-card .stat-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
.stat-card.danger .stat-value{color:var(--danger);}
.stat-card.warning .stat-value{color:var(--warning);}
.stat-card.profit .stat-value{color:var(--profit);}
.weekly-card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:16px;}
.weekly-card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;}
.week-bars{display:flex;gap:6px;align-items:flex-end;height:80px;}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.week-bar-fill{width:100%;border-radius:6px 6px 0 0;background:var(--navy);opacity:.2;min-height:4px;transition:height .5s ease;}
.week-bar-fill.today{background:var(--accent);opacity:1;}
.week-bar-day{font-size:10px;font-weight:700;color:var(--text3);}
.week-bar-day.today{color:var(--accent);}
.week-bar-val{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.recent-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.recent-card h3{font-size:14px;font-weight:700;padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.sale-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);}
.sale-item:last-child{border-bottom:none;}
.sale-dot{width:36px;height:36px;border-radius:10px;background:rgba(15,76,129,.08);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sale-info{flex:1;min-width:0;}
.sale-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sale-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.sale-amount{font-size:15px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.sell-container{padding:16px;flex:1;overflow-y:auto;}
.search-input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;font-size:16px;font-family:inherit;color:var(--text);outline:none;transition:.2s;}
.search-input:focus{border-color:var(--navy);}
.drug-results{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);}
.drug-result-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s;}
.drug-result-item:last-child{border-bottom:none;}
.drug-result-item:active{background:var(--surface2);}
.dri-info{flex:1;}
.dri-name{font-size:15px;font-weight:600;}
.dri-detail{font-size:12px;color:var(--text3);margin-top:2px;}
.dri-price{font-size:16px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;}
.dri-stock{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(0,200,150,.1);color:var(--accent);}
.dri-stock.low{background:rgba(244,162,97,.1);color:var(--warning);}
.dri-stock.empty{background:rgba(230,57,70,.1);color:var(--danger);}
.cart-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.cart-section h3{font-size:14px;font-weight:700;padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cart-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);}
.cart-item:last-child{border-bottom:none;}
.cart-item-name{flex:1;font-size:14px;font-weight:500;}
.cart-qty-wrap{display:flex;align-items:center;gap:8px;}
.qty-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.qty-input{width:48px;text-align:center;border:1.5px solid var(--border);border-radius:8px;padding:6px 4px;font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;outline:none;}
.cart-item-total{font-size:14px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;min-width:70px;text-align:right;}
.cart-remove{color:var(--danger);background:none;border:none;font-size:18px;cursor:pointer;padding:4px;}
.cart-footer{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cart-total-label{font-size:13px;color:var(--text2);}
.cart-total-val{font-size:22px;font-weight:800;color:var(--navy);font-family:'JetBrains Mono',monospace;}
.sell-actions{display:flex;gap:10px;margin-bottom:20px;}
.btn-primary{flex:1;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-primary:active{background:var(--navy-dark);}
.btn-success{flex:1;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-success:active{background:var(--accent-dark);}
.btn-danger{background:var(--danger);color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-add{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;}
.btn-add span{font-size:20px;}
.filter-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--text2);transition:.15s;}
.filter-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.drug-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);}
.drug-card-top{display:flex;align-items:flex-start;gap:10px;}
.drug-card-icon{width:40px;height:40px;border-radius:12px;background:rgba(15,76,129,.08);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.drug-card-info{flex:1;min-width:0;}
.drug-card-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.drug-card-cat{font-size:11px;color:var(--text3);margin-top:2px;}
.drug-card-actions{display:flex;gap:5px;flex-shrink:0;}
.icon-btn{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.icon-btn.danger{border-color:rgba(230,57,70,.3);background:rgba(230,57,70,.05);color:var(--danger);}
.drug-card-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.drug-stat{flex:1;min-width:60px;text-align:center;background:var(--surface2);border-radius:8px;padding:6px 4px;}
.drug-stat-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--navy);}
.drug-stat-label{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-top:2px;}
.issued-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,200,150,.12);color:var(--accent);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.issue-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;}
.report-container{padding:16px;flex:1;overflow-y:auto;}
.date-filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.date-input{flex:1;min-width:120px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none;}
.report-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.rsummary-item{background:var(--surface);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border);}
.rsummary-val{font-size:18px;font-weight:800;color:var(--navy);font-family:'JetBrains Mono',monospace;}
.rsummary-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-top:4px;}
.report-table-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;}
.report-table-wrap h3{font-size:14px;font-weight:700;padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.report-entry{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);position:relative;}
.report-entry:last-child{border-bottom:none;}
.re-info{flex:1;}
.re-drug{font-size:14px;font-weight:600;}
.re-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.re-amount{font-size:14px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;}
.admin-container{padding:16px;flex:1;overflow-y:auto;}
.admin-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.admin-section-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.admin-section-header h3{font-size:15px;font-weight:700;}
.admin-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);}
.admin-item:last-child{border-bottom:none;}
.admin-item-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.admin-item-info{flex:1;}
.admin-item-name{font-size:14px;font-weight:600;}
.admin-item-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.admin-item-actions{display:flex;gap:6px;}
.profit-card{background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:var(--radius);padding:16px;margin-bottom:16px;color:#fff;box-shadow:var(--shadow-lg);}
.profit-card h3{font-size:13px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.5px;}
.profit-card .profit-val{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;margin:8px 0 4px;}
.profit-card .profit-sub{font-size:12px;opacity:.7;}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3);}
.empty-state .es-icon{font-size:56px;margin-bottom:16px;}
.empty-state h3{font-size:17px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.empty-state p{font-size:13px;line-height:1.6;}
.receipt-preview{background:var(--surface2);border-radius:12px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.8;border:1px dashed var(--border);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
.modal-header{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:8px;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:.2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);}
.toast-container{position:fixed;top:80px;right:16px;left:16px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--text);color:#fff;border-radius:12px;padding:14px 16px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;pointer-events:all;}
.toast.success{background:var(--accent);}
.toast.error{background:var(--danger);}
.toast.warning{background:var(--warning);}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;pointer-events:none}}
.sale-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.sale-popup-overlay.open{display:flex;}
.sale-popup{background:var(--surface);border-radius:24px;width:92%;max-width:380px;padding:28px 22px;text-align:center;animation:popIn .4s cubic-bezier(0.34,1.56,0.64,1);max-height:90vh;overflow-y:auto;}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.sale-popup .popup-icon{font-size:56px;margin-bottom:10px;}
.sale-popup h2{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:6px;}
.sale-popup .popup-amount{font-size:28px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace;margin:8px 0;}
.sale-popup .popup-detail{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.7;text-align:left;background:var(--surface2);border-radius:10px;padding:12px;}
.sale-popup .popup-btn{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;margin-top:6px;}
.sale-popup .popup-btn-cancel{background:none;color:var(--text2);border:1.5px solid var(--border);border-radius:12px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-top:8px;}
.success-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:401;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.success-popup-overlay.open{display:flex;}
.success-popup{background:var(--surface);border-radius:24px;width:88%;max-width:360px;padding:32px 24px;text-align:center;animation:popIn .4s cubic-bezier(0.34,1.56,0.64,1);}
@media(min-width:768px){
  body{background:#e2e8f0;}
  .sidebar{max-width:280px;}
  .stats-grid{grid-template-columns:1fr 1fr 1fr 1fr;}
  .report-summary{grid-template-columns:1fr 1fr 1fr 1fr;}
  .sale-popup,.success-popup{max-width:480px;}
  .dash-scroll{padding:20px 24px;}
  .sell-container,.inv-container,.report-container,.admin-container,.return-container{padding:20px 24px;}
}
@media(min-width:1024px){
  #main-screen{flex-direction:row;}
  .sidebar{position:relative;left:0!important;width:260px;flex-shrink:0;display:flex!important;}
  .sidebar-overlay{display:none!important;}
  .topbar .menu-btn{display:none;}
  .bottom-nav{display:none;}
  .page{padding-bottom:16px;}
  .screen-content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .stats-grid{grid-template-columns:repeat(4,1fr);}
  .form-row{grid-template-columns:1fr 1fr 1fr;}
  .drug-card-stats{display:grid;grid-template-columns:repeat(4,1fr);}
  .inv-container,.sell-container{max-width:900px;}
  .admin-container,.report-container{max-width:1000px;}
}
</style>

<body>

<div id="app-loader">
  <span class="logo-icon">💊</span>
  <h1>XYZ Pharmacy</h1>
  <p>Management System</p>

</div>

<div class="toast-container" id="toast-container"></div>

<div class="sale-popup-overlay" id="sale-confirm-overlay">...</div>

<div class="screen" id="login-screen">

</div>

<div class="screen" id="main-screen">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="sidebar-user"><div class="sidebar-avatar" id="sb-avatar">?</div><div><div class="sidebar-name" id="sb-name">—</div><div class="sidebar-role" id="sb-role">—</div></div></div></div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer"><button class="nav-item" style="color:#e63946;" onclick="doLogout()"><span class="nav-icon">🚪</span> Toka Mfumoni</button><div style="padding:10px;font-size:11px;color:rgba(255,255,255,.3);text-align:center;">XYZ Pharmacy v4.0 (Offline)</div></div>
  </div>
  <div class="screen-content-area">
    <div class="topbar"><div class="topbar-left"><button class="menu-btn" onclick="toggleSidebar()">☰</button><div><div class="topbar-title" id="topbar-title">Dashboard</div><div class="topbar-sub" id="topbar-sub">Karibu</div></div></div><div class="topbar-right"></div></div>
    <div class="page active" id="page-dashboard"><div class="dash-scroll" id="dash-scroll"></div></div>
    <div class="page" id="page-sell"><div class="sell-container" id="sell-container"></div></div>
    <div class="page" id="page-store"><div class="inv-container" id="inv-container"></div></div>
    <div class="page" id="page-reports"><div class="report-container" id="report-container"></div></div>
    <div class="page" id="page-admin"><div class="admin-container" id="admin-container"></div></div>
    <div class="page" id="page-returns"><div class="return-container" id="return-container"></div></div>
    <div class="page" id="page-reminders"><div class="admin-container" id="reminder-container"></div></div>

</div>

<div class="modal-overlay" id="modal-overlay"><div class="modal"><div class="modal-header"><span id="modal-title"></span><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"></div></div></div>

<script>
// ==================== STORAGE KEYS ====================
const LS = {
  session: 'xyz_session',
  drugs: 'xyz_drugs',
  sales: 'xyz_sales',
  users: 'xyz_users',
  stores: 'xyz_stores',
  returns: 'xyz_returns',
  reminders: 'xyz_reminders',
};

// ==================== GLOBAL STATE ====================
let currentUser = null;
let cart = [];
let allDrugs = [];
let allSales = [];
let allUsers = [];
let allStores = [];
let allReturns = [];
let allReminders = [];
let currentPage = 'dashboard';
let _pendingSaleData = null;

// ==================== HELPERS ====================
function saveLocal(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {} }
function getLocal(key) { try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : null; } catch(e) { return null; } }
function fmt(n) { return new Intl.NumberFormat('sw-TZ').format(Math.round(n||0)); }
function showToast(msg, type='default') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerText = msg;
  document.getElementById('toast-container').appendChild(toast);
  setTimeout(()=>toast.remove(),3000);
}

// ==================== SEED INITIAL DATA ====================
function seedInitialData() {
  const users = [
    { id:'u1', username:'admin', password:'12345', role:'superadmin', name:'Msimamizi Mkuu', storeId:null, phone:'0742417963' },
    { id:'u2', username:'owner', password:'owner123', role:'owner', name:'Mmiliki Mfano', storeId:'store1', phone:'0742417964' },
    { id:'u3', username:'seller', password:'seller123', role:'seller', name:'Muuzaji Mfano', storeId:'store1', phone:'0742417965' }
  ];
  const stores = [{ id:'store1', name:'XYZ Pharmacy - Kariakoo', location:'Kariakoo, Dar es Salaam', ownerId:'u2' }];
  const drugs = [
    { id:'drug1', name:'Panadol Extra', category:'Maumivu', unit:'kibao', buyPrice:500, price:1000, stock:100, posStock:50, minStock:10, storeId:'store1', issuedToPos:true },
    { id:'drug2', name:'Amoxil 500mg', category:'Antibiotiki', unit:'kibao', buyPrice:1500, price:3000, stock:50, posStock:30, minStock:5, storeId:'store1', issuedToPos:true }
  ];
  saveLocal(LS.users, users);
  saveLocal(LS.stores, stores);
  saveLocal(LS.drugs, drugs);
  saveLocal(LS.sales, []);
  saveLocal(LS.returns, []);
  saveLocal(LS.reminders, []);
  return { users, stores, drugs };
}

// ==================== LOAD ALL DATA FROM LOCALSTORAGE ====================
function loadAllData() {
  allUsers = getLocal(LS.users) || [];
  allStores = getLocal(LS.stores) || [];
  allDrugs = getLocal(LS.drugs) || [];
  allSales = getLocal(LS.sales) || [];
  allReturns = getLocal(LS.returns) || [];
  allReminders = getLocal(LS.reminders) || [];
  if(allUsers.length === 0 || allStores.length === 0) {
    const seed = seedInitialData();
    allUsers = seed.users; allStores = seed.stores; allDrugs = seed.drugs;
  }
}

// ==================== AUTHENTICATION ====================
function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();
  if(!username || !password) { showToast('⚠️ Ingiza jina na nywila','warning'); return; }
  const user = allUsers.find(u => u.username === username && u.password === password);
  if(user) {
    currentUser = user;
    saveLocal(LS.session, user);
    showToast(`✅ Karibu, ${user.name}!`,'success');
    enterApp();
  } else showToast('❌ Jina au nywila si sahihi','error');
}

function doLogout() {
  saveLocal(LS.session, null);
  currentUser = null;
  cart = [];
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
  closeSidebar();
  showToast('👋 Umetoka mfumoni','success');
}

function enterApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('main-screen').classList.add('active');
  setupUI();
  navigateTo('dashboard');
}

// ==================== UI SETUP ====================
function setupUI() {
  if(!currentUser) return;
  document.getElementById('sb-name').textContent = currentUser.name;
  const roleText = { superadmin:'🔴 Msimamizi Mkuu', owner:'🟡 Mmiliki wa Duka', seller:'🟢 Muuzaji' }[currentUser.role];
  document.getElementById('sb-role').textContent = roleText;
  document.getElementById('sb-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
  const navItems = getNavItems(currentUser.role);
  document.getElementById('sidebar-nav').innerHTML = navItems.map(sec => `<div class="nav-section"><div class="nav-section-title">${sec.title}</div>${sec.items.map(item=>`<button class="nav-item" onclick="navigateTo('${item.page}');closeSidebar()"><span class="nav-icon">${item.icon}</span> ${item.label}</button>`).join('')}</div>`).join('');
  const bnav = getBottomNav(currentUser.role);
  document.getElementById('bottom-nav').innerHTML = bnav.map(item=>`<button class="bottom-nav-item" id="bnav-${item.page}" onclick="navigateTo('${item.page}')"><span class="bnav-icon">${item.icon}</span><span class="bnav-label">${item.label}</span></button>`).join('');
  const store = allStores.find(s=>s.id===currentUser.storeId);
  document.getElementById('topbar-sub').textContent = store ? store.name : (currentUser.role==='superadmin'?'Mfumo Wote':currentUser.name);
}

function getNavItems(role) {
  const common = [{title:'MSINGI',items:[{icon:'🏠',label:'Dashibodi',page:'dashboard'}]}];
  if(role==='seller') return [...common, {title:'MAUZO',items:[{icon:'🛒',label:'Point of Sale',page:'sell'},{icon:'↩️',label:'Rudisha Dawa',page:'returns'}]},{title:'TAARIFA',items:[{icon:'📊',label:'Ripoti Zangu',page:'reports'},{icon:'🔔',label:'Kumbushisho',page:'reminders'}]}];
  if(role==='owner') return [...common, {title:'HIFADHI',items:[{icon:'🏪',label:'Store (Dawa)',page:'store'},{icon:'↩️',label:'Rejeshi Zote',page:'returns'}]},{title:'TAARIFA',items:[{icon:'📊',label:'Ripoti za Mauzo',page:'reports'},{icon:'🔔',label:'Kumbushisho',page:'reminders'}]},{title:'USIMAMIZI',items:[{icon:'👥',label:'Wauzaji',page:'admin'}]}];
  return [...common, {title:'MAUZO',items:[{icon:'🛒',label:'Point of Sale',page:'sell'},{icon:'↩️',label:'Rejeshi Zote',page:'returns'}]},{title:'HIFADHI',items:[{icon:'🏪',label:'Store (Dawa)',page:'store'}]},{title:'MADUKA',items:[{icon:'🏬',label:'Maduka & Watumiaji',page:'admin'}]},{title:'TAARIFA',items:[{icon:'📊',label:'Ripoti Zote',page:'reports'},{icon:'🔔',label:'Kumbushisho',page:'reminders'}]}];
}

function getBottomNav(role) {
  if(role==='seller') return [{icon:'🏠',label:'Nyumbani',page:'dashboard'},{icon:'🛒',label:'Uza',page:'sell'},{icon:'↩️',label:'Rudisha',page:'returns'},{icon:'🔔',label:'Kumbusho',page:'reminders'},{icon:'📊',label:'Ripoti',page:'reports'}];
  if(role==='owner') return [{icon:'🏠',label:'Nyumbani',page:'dashboard'},{icon:'🏪',label:'Store',page:'store'},{icon:'📊',label:'Ripoti',page:'reports'},{icon:'🔔',label:'Kumbusho',page:'reminders'},{icon:'👥',label:'Timu',page:'admin'}];
  return [{icon:'🏠',label:'Nyumbani',page:'dashboard'},{icon:'🛒',label:'Uza',page:'sell'},{icon:'🏪',label:'Store',page:'store'},{icon:'📊',label:'Ripoti',page:'reports'},{icon:'🏬',label:'Maduka',page:'admin'}];
}

async function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.bottom-nav-item').forEach(b=>b.classList.remove('active'));
  const active = document.getElementById('bnav-'+page);
  if(active) active.classList.add('active');
  const titles = {dashboard:['Dashibodi','Muhtasari'], sell:['Point of Sale','Chagua dawa'], store:['Store','Hifadhi ya Dawa'], reports:['Ripoti','Mauzo yako'], admin:['Usimamizi','Maduka na Watumiaji'], returns:['Rejeshi','Dawa zilizorudishwa'], reminders:['Kumbushisho','Dawa za wagonjwa']};
  document.getElementById('topbar-title').textContent = titles[page][0];
  document.getElementById('topbar-sub').textContent = titles[page][1];
  const renderMap = {dashboard:renderDashboard, sell:renderSell, store:renderStore, reports:renderReports, admin:renderAdmin, returns:renderReturns, reminders:renderReminders};
  if(renderMap[page]) renderMap[page]();
}

function getMyStores() {
  if(!currentUser) return [];
  if(currentUser.role==='superadmin') return allStores.map(s=>s.id);
  if(currentUser.role==='owner') return allStores.filter(s=>s.ownerId===currentUser.id||s.id===currentUser.storeId).map(s=>s.id);
  return [currentUser.storeId].filter(Boolean);
}

function getMyDrugs() {
  const stores = getMyStores();
  return allDrugs.filter(d => stores.includes(d.storeId) || currentUser.role==='superadmin');
}

function openModal(title,body,buttons=[]){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const footer = document.getElementById('modal-footer');
  const btnStyles = {primary:'background:var(--navy);color:#fff;', success:'background:var(--accent);', danger:'background:var(--danger);', outline:'background:none;color:var(--navy);border:1.5px solid var(--navy);'};
  footer.innerHTML = buttons.map((b,i)=>`<button style="${btnStyles[b.style]||btnStyles.primary}border-radius:12px;padding:14px;flex:1;font-size:14px;font-weight:700;cursor:pointer;" onclick="modalActions[${i}]()">${b.label}</button>`).join('');
  window.modalActions = buttons.map(b=>b.action);
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

// ==================== DASHBOARD ====================
function renderDashboard() {
  const u = currentUser;
  const myStores = getMyStores();
  const today = new Date().toISOString().slice(0,10);
  const mySales = allSales.filter(s => u.role==='superadmin' || myStores.includes(s.storeId));
  const todaySales = mySales.filter(s => s.date === today);
  const totalToday = todaySales.reduce((a,b)=>a+(b.total||0),0);
  const totalMonth = mySales.filter(s=>s.date.slice(0,7)===today.slice(0,7)).reduce((a,b)=>a+(b.total||0),0);
  const totalTx = todaySales.length;
  const canSeeProfit = u.role==='superadmin' || u.role==='owner';
  const profitToday = todaySales.reduce((a,b)=>a+(b.profit||0),0);
  const profitMonth = mySales.filter(s=>s.date.slice(0,7)===today.slice(0,7)).reduce((a,b)=>a+(b.profit||0),0);
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let weekData = [], maxVal = 1;
  for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); const ds=d.toISOString().slice(0,10); const val=mySales.filter(s=>s.date===ds).reduce((a,b)=>a+(b.total||0),0); weekData.push({day:dayNames[d.getDay()],val,isToday:i===0,date:ds}); if(val>maxVal) maxVal=val; }
  const myDrugs = allDrugs.filter(d=>u.role==='superadmin'||myStores.includes(d.storeId));
  const lowStock = myDrugs.filter(d=>(d.posStock??d.stock)<=(d.minStock||10));
  const fullDayNames=['Jumapili','Jumatatu','Jumanne','Jumatano','Alhamisi','Ijumaa','Jumamosi'];
  const todayName = fullDayNames[new Date().getDay()];
  const todayFmt = new Date().toLocaleDateString('sw-TZ',{day:'numeric',month:'long',year:'numeric'});
  const recentSales = todaySales.slice(-4).reverse();
  const drugTotals={}; todaySales.forEach(s=>{ drugTotals[s.drugName]=(drugTotals[s.drugName]||0)+(s.qty||0); });
  const topToday = Object.entries(drugTotals).sort((a,b)=>b[1]-a[1]).slice(0,3);
  document.getElementById('dash-scroll').innerHTML = `
    <div class="dash-greeting"><h2>Habari, ${u.name.split(' ')[0]}! 👋</h2><p>${u.role==='superadmin'?'🔴 Msimamizi Mkuu':(u.role==='owner'?'🟡 Mmiliki':'🟢 Muuzaji')}</p><div class="dash-date">📅 <span>${todayName}, ${todayFmt}</span></div></div>
    <div class="stats-grid"><div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">TZS ${fmt(totalToday)}</div><div class="stat-label">Mauzo Leo</div></div><div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-value">${totalTx}</div><div class="stat-label">Miamala Leo</div></div><div class="stat-card"><div class="stat-icon">📅</div><div class="stat-value">TZS ${fmt(totalMonth)}</div><div class="stat-label">Mauzo Mwezi</div></div><div class="stat-card ${lowStock.length>5?'danger':lowStock.length>0?'warning':''}"><div class="stat-icon">⚠️</div><div class="stat-value">${lowStock.length}</div><div class="stat-label">Dawa Chache</div></div></div>
    ${canSeeProfit?`<div class="profit-card"><h3>💹 Faida ya Leo</h3><div class="profit-val">TZS ${fmt(profitToday)}</div><div class="profit-sub">Mwezi: TZS ${fmt(profitMonth)} | Margin: ${totalToday>0?Math.round((profitToday/totalToday)*100):0}%</div><div class="mini-chart-row">${weekData.map(w=>{ const pd=mySales.filter(s=>s.date===w.date).reduce((a,b)=>a+(b.profit||0),0); const mp=Math.max(...weekData.map(x=>mySales.filter(s=>s.date===x.date).reduce((a,b)=>a+(b.profit||0),0)),1); return `<div class="mini-bar${w.isToday?' active':''}" style="height:${Math.max(4,Math.round((pd/mp)*100))}%;" title="${w.day}: TZS ${fmt(pd)}"></div>`; }).join('')}</div></div>`:''}
    <div class="weekly-card"><h3>📈 Mauzo ya Wiki Hii (TZS)</h3><div class="week-bars">${weekData.map(w=>`<div class="week-bar-wrap"><div style="flex:1;display:flex;align-items:flex-end;width:100%;"><div class="week-bar-fill${w.isToday?' today':''}" style="height:${Math.max(2,Math.round((w.val/maxVal)*100))}%;width:100%;"></div></div><div class="week-bar-day${w.isToday?' today':''}">${w.day}</div><div class="week-bar-val">${w.val>0?(w.val>=1000?Math.round(w.val/1000)+'k':w.val):'-'}</div></div>`).join('')}</div></div>
    ${lowStock.length?`<div class="recent-card"><h3>⚠️ Dawa Karibu Kuisha (${lowStock.length})</h3>${lowStock.slice(0,3).map(d=>`<div class="sale-item"><div class="sale-dot">💊</div><div class="sale-info"><div class="sale-name">${d.name}</div><div class="sale-meta">${d.category} • Iliyobaki: ${d.posStock??d.stock} ${d.unit}</div></div><div class="dri-stock ${(d.posStock??d.stock)===0?'empty':'low'}">${(d.posStock??d.stock)===0?'Imeisha':'Chache'}</div></div>`).join('')}${lowStock.length>3?`<div style="padding:10px 16px;text-align:center;font-size:12px;">+${lowStock.length-3} dawa zaidi...</div>`:''}</div>`:''}
    ${topToday.length?`<div class="recent-card"><h3>🔥 Dawa Zinazouzwa Leo (Top ${topToday.length})</h3>${topToday.map(([name,qty],i)=>`<div class="sale-item"><div class="sale-dot" style="background:rgba(0,200,150,.1);font-size:14px;font-weight:800;color:var(--accent);">${i+1}</div><div class="sale-info"><div class="sale-name">${name}</div><div class="sale-meta">Imeuzwa: ${qty} vipande leo</div></div></div>`).join('')}</div>`:''}
    <div class="recent-card"><h3>🕐 Mauzo ya Hivi Karibuni</h3>${recentSales.length===0?`<div class="empty-state"><div class="es-icon">🛒</div><p>Hakuna mauzo leo bado</p></div>`:recentSales.map(s=>`<div class="sale-item"><div class="sale-dot">💊</div><div class="sale-info"><div class="sale-name">${s.drugName}</div><div class="sale-meta">${s.qty} × TZS ${fmt(s.price)} • ${s.sellerName} • ${s.time}</div></div><div class="sale-amount">TZS ${fmt(s.total)}</div></div>`).join('')}${todaySales.length>4?`<div style="padding:10px 16px;text-align:center;font-size:12px;color:var(--navy);font-weight:600;cursor:pointer;" onclick="navigateTo('reports')">Tazama miamala yote (${todaySales.length}) →</div>`:''}</div>
  `;
}
