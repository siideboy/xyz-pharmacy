<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --navy: #0f4c81;
  --navy-dark: #0a3460;
  --navy-light: #1a6bb5;
  --accent: #00c896;
  --accent-dark: #00a87e;
  --danger: #e63946;
  --warning: #f4a261;
  --profit: #7c3aed;
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #e2e8f0;
  --text: #1a202c;
  --text2: #4a5568;
  --text3: #94a3b8;
  --shadow: 0 2px 12px rgba(15,76,129,0.10);
  --shadow-lg: 0 8px 32px rgba(15,76,129,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);}
#app-loader{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
#app-loader .logo-icon{font-size:64px;animation:pulse 1.5s infinite;}
#app-loader h1{color:#fff;font-size:22px;font-weight:700;margin-top:16px;}
#app-loader p{color:rgba(255,255,255,.6);font-size:13px;margin-top:8px;}
#app-loader .loader-bar{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:10px;margin-top:24px;overflow:hidden;}
#app-loader .loader-fill{height:100%;background:var(--accent);border-radius:10px;animation:load 1.8s ease-in-out forwards;}
@keyframes load{0%{width:0%}100%{width:100%}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.screen{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;}
.screen.active{display:flex;}
#login-screen{background:linear-gradient(160deg,var(--navy-dark) 0%,var(--navy) 50%,var(--navy-light) 100%);align-items:center;justify-content:center;padding:24px;}
.login-card{width:100%;max-width:400px;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:40px 32px;animation:slideUp .5s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .icon{font-size:56px;display:block;}
.login-logo h1{color:#fff;font-size:24px;font-weight:800;margin-top:12px;}
.login-logo p{color:rgba(255,255,255,.6);font-size:13px;margin-top:4px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;color:rgba(255,255,255,.8);font-size:13px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px;}
.form-group input{width:100%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:12px;padding:14px 16px;color:#fff;font-size:16px;font-family:inherit;transition:.2s;outline:none;}
.form-group input::placeholder{color:rgba(255,255,255,.4);}
.form-group input:focus{border-color:var(--accent);background:rgba(255,255,255,.18);}
.btn-login{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s;margin-top:8px;}
.btn-login:active{transform:scale(.98);background:var(--accent-dark);}
.login-help{text-align:center;margin-top:20px;color:rgba(255,255,255,.5);font-size:12px;line-height:1.7;}
.login-help strong{color:rgba(255,255,255,.8);}
.offline-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(244,162,97,.2);border:1px solid rgba(244,162,97,.4);color:#f4a261;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;margin-bottom:20px;}
#main-screen{background:var(--bg);}
.topbar{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-left .menu-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:38px;height:38px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
.online-dot.offline{background:var(--warning);}
.sync-btn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;backdrop-filter:blur(4px);}
.sidebar-overlay.open{display:block;}
.sidebar{position:fixed;left:-280px;top:0;bottom:0;width:280px;background:var(--navy-dark);z-index:201;transition:left .3s ease;overflow-y:auto;display:flex;flex-direction:column;}
.sidebar.open{left:0;}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-user{display:flex;align-items:center;gap:14px;}
.sidebar-avatar{width:48px;height:48px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;}
.sidebar-name{color:#fff;font-size:15px;font-weight:700;}
.sidebar-role{color:rgba(255,255,255,.5);font-size:12px;margin-top:2px;}
.sidebar-nav{flex:1;padding:16px 12px;}
.nav-section{margin-bottom:8px;}
.nav-section-title{color:rgba(255,255,255,.3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:8px 10px 6px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;color:rgba(255,255,255,.7);font-size:14px;font-weight:500;cursor:pointer;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.1);color:#fff;}
.nav-item .nav-icon{font-size:20px;width:24px;text-align:center;}
.sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,.08);}
.page{display:none;flex-direction:column;flex:1;padding:0 0 80px 0;}
.page.active{display:flex;}
.page-header{padding:20px 16px 12px;background:var(--surface);border-bottom:1px solid var(--border);margin-bottom:4px;}
.page-title{font-size:20px;font-weight:800;}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;color:var(--text3);transition:.15s;border:none;background:none;font-family:inherit;}
.bottom-nav-item.active{color:var(--navy);}
.bottom-nav-item .bnav-icon{font-size:22px;line-height:1;}
.bottom-nav-item .bnav-label{font-size:10px;font-weight:600;margin-top:3px;}
.dash-scroll{padding:16px;overflow-y:auto;flex:1;}
.dash-greeting{background:linear-gradient(135deg,var(--navy),var(--navy-light));border-radius:20px;padding:20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
.dash-greeting::after{content:'💊';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:56px;opacity:.15;}
.dash-greeting h2{font-size:20px;font-weight:800;}
.dash-greeting p{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px;}
.dash-greeting .dash-date{font-size:12px;color:rgba(255,255,255,.5);margin-top:8px;display:flex;align-items:center;gap:6px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);}
.stat-card .stat-icon{font-size:28px;margin-bottom:8px;}
.stat-card .stat-value{font-size:20px;font-weight:800;color:var(--navy);font-family:'JetBrains Mono',monospace;}
.stat-card .stat-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
.stat-card.danger .stat-value{color:var(--danger);}
.stat-card.warning .stat-value{color:var(--warning);}
.stat-card.profit .stat-value{color:var(--profit);}
.weekly-card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:16px;}
.weekly-card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;}
.week-bars{display:flex;gap:6px;align-items:flex-end;height:80px;}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.week-bar-fill{width:100%;border-radius:6px 6px 0 0;background:var(--navy);opacity:.2;min-height:4px;transition:height .5s ease;}
.week-bar-fill.today{background:var(--accent);opacity:1;}
.week-bar-day{font-size:10px;font-weight:700;color:var(--text3);}
.week-bar-day.today{color:var(--accent);}
.week-bar-val{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.recent-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.recent-card h3{font-size:14px;font-weight:700;padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.sale-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);}
.sale-item:last-child{border-bottom:none;}
.sale-dot{width:36px;height:36px;border-radius:10px;background:rgba(15,76,129,.08);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sale-info{flex:1;min-width:0;}
.sale-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sale-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.sale-amount{font-size:15px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.sell-container{padding:16px;flex:1;overflow-y:auto;}
.search-box{display:flex;gap:10px;margin-bottom:16px;}
.search-input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;font-size:16px;font-family:inherit;color:var(--text);outline:none;transition:.2s;}
.search-input:focus{border-color:var(--navy);}
.drug-results{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);}
.drug-result-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s;}
.drug-result-item:last-child{border-bottom:none;}
.drug-result-item:active{background:var(--surface2);}
.dri-info{flex:1;}
.dri-name{font-size:15px;font-weight:600;}
.dri-detail{font-size:12px;color:var(--text3);margin-top:2px;}
.dri-price{font-size:16px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;}
.dri-stock{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(0,200,150,.1);color:var(--accent);}
.dri-stock.low{background:rgba(244,162,97,.1);color:var(--warning);}
.dri-stock.empty{background:rgba(230,57,70,.1);color:var(--danger);}
.cart-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.cart-section h3{font-size:14px;font-weight:700;padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cart-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);}
.cart-item:last-child{border-bottom:none;}
.cart-item-name{flex:1;font-size:14px;font-weight:500;}
.cart-qty-wrap{display:flex;align-items:center;gap:8px;}
.qty-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.qty-input{width:48px;text-align:center;border:1.5px solid var(--border);border-radius:8px;padding:6px 4px;font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;outline:none;}
.cart-item-total{font-size:14px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;min-width:70px;text-align:right;}
.cart-remove{color:var(--danger);background:none;border:none;font-size:18px;cursor:pointer;padding:4px;}
.cart-footer{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cart-total-label{font-size:13px;color:var(--text2);}
.cart-total-val{font-size:22px;font-weight:800;color:var(--navy);font-family:'JetBrains Mono',monospace;}
.sell-actions{display:flex;gap:10px;margin-bottom:20px;}
.btn-primary{flex:1;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-primary:active{background:var(--navy-dark);}
.btn-success{flex:1;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-success:active{background:var(--accent-dark);}
.btn-danger{background:var(--danger);color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-warning{background:var(--warning);color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-outline{background:none;color:var(--navy);border:1.5px solid var(--navy);border-radius:12px;padding:14px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.inv-container{padding:16px;flex:1;overflow-y:auto;}
.action-bar{display:flex;gap:10px;margin-bottom:16px;}
.btn-add{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;}
.btn-add span{font-size:20px;}
.filter-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--text2);transition:.15s;}
.filter-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.drug-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);}
.drug-card-top{display:flex;align-items:flex-start;gap:12px;}
.drug-card-icon{width:44px;height:44px;border-radius:12px;background:rgba(15,76,129,.08);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.drug-card-info{flex:1;}
.drug-card-name{font-size:16px;font-weight:700;}
.drug-card-cat{font-size:12px;color:var(--text3);margin-top:2px;}
.drug-card-actions{display:flex;gap:6px;}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.icon-btn.danger{border-color:rgba(230,57,70,.3);background:rgba(230,57,70,.05);color:var(--danger);}
.drug-card-stats{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap;}
.drug-stat{flex:1;min-width:60px;text-align:center;}
.drug-stat-val{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--navy);}
.drug-stat-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;}
.issued-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,200,150,.12);color:var(--accent);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.not-issued-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(230,57,70,.1);color:var(--danger);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.report-container{padding:16px;flex:1;overflow-y:auto;}
.date-filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.date-input{flex:1;min-width:120px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none;}
.date-input:focus{border-color:var(--navy);}
.report-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.rsummary-item{background:var(--surface);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border);}
.rsummary-val{font-size:18px;font-weight:800;color:var(--navy);font-family:'JetBrains Mono',monospace;}
.rsummary-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-top:4px;}
.report-table-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;}
.report-table-wrap h3{font-size:14px;font-weight:700;padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.report-entry{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);position:relative;}
.report-entry:last-child{border-bottom:none;}
.re-info{flex:1;}
.re-drug{font-size:14px;font-weight:600;}
.re-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.re-amount{font-size:14px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace;}
.re-delete{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;}
.admin-container{padding:16px;flex:1;overflow-y:auto;}
.admin-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.admin-section-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.admin-section-header h3{font-size:15px;font-weight:700;}
.admin-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);}
.admin-item:last-child{border-bottom:none;}
.admin-item-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.admin-item-info{flex:1;}
.admin-item-name{font-size:14px;font-weight:600;}
.admin-item-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.admin-item-actions{display:flex;gap:6px;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:rgba(15,76,129,.1);color:var(--navy);}
.badge-green{background:rgba(0,200,150,.1);color:var(--accent);}
.badge-red{background:rgba(230,57,70,.1);color:var(--danger);}
.badge-orange{background:rgba(244,162,97,.1);color:var(--warning);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
.modal-header{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:8px;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:.2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);}
.field textarea{min-height:80px;resize:vertical;}
.toast-container{position:fixed;top:80px;right:16px;left:16px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--text);color:#fff;border-radius:12px;padding:14px 16px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;pointer-events:all;}
.toast.success{background:var(--accent);}
.toast.error{background:var(--danger);}
.toast.warning{background:var(--warning);}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;pointer-events:none}}
.sale-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.sale-popup-overlay.open{display:flex;}
.sale-popup{background:var(--surface);border-radius:24px;width:92%;max-width:380px;padding:28px 22px;text-align:center;animation:popIn .4s cubic-bezier(0.34,1.56,0.64,1);max-height:90vh;overflow-y:auto;}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.sale-popup .popup-icon{font-size:56px;margin-bottom:10px;}
.sale-popup h2{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:6px;}
.sale-popup .popup-amount{font-size:28px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace;margin:8px 0;}
.sale-popup .popup-detail{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.7;text-align:left;background:var(--surface2);border-radius:10px;padding:12px;}
.sale-popup .popup-btn{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;margin-top:6px;}
.sale-popup .popup-btn-cancel{background:none;color:var(--text2);border:1.5px solid var(--border);border-radius:12px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-top:8px;}
.success-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:401;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.success-popup-overlay.open{display:flex;}
.success-popup{background:var(--surface);border-radius:24px;width:88%;max-width:360px;padding:32px 24px;text-align:center;animation:popIn .4s cubic-bezier(0.34,1.56,0.64,1);}
.reminder-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.reminder-card h3{font-size:14px;font-weight:700;padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.reminder-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);}
.reminder-item:last-child{border-bottom:none;}
.profit-card{background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:var(--radius);padding:16px;margin-bottom:16px;color:#fff;box-shadow:var(--shadow-lg);}
.profit-card h3{font-size:13px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.5px;}
.profit-card .profit-val{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;margin:8px 0 4px;}
.profit-card .profit-sub{font-size:12px;opacity:.7;}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3);}
.empty-state .es-icon{font-size:56px;margin-bottom:16px;}
.empty-state h3{font-size:17px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.empty-state p{font-size:13px;line-height:1.6;}
.receipt-preview{background:var(--surface2);border-radius:12px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.8;border:1px dashed var(--border);}
.receipt-preview h4{text-align:center;font-size:14px;margin-bottom:8px;}
.receipt-divider{border:none;border-top:1px dashed var(--border);margin:8px 0;}
.sync-indicator{background:rgba(244,162,97,.1);border:1px solid rgba(244,162,97,.3);border-radius:12px;padding:12px 16px;margin:0 16px 12px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--warning);}
.sync-indicator.hidden{display:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
.store-section-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(15,76,129,.1);color:var(--navy);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;margin-bottom:12px;}
.issue-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.mini-chart-row{display:flex;gap:4px;align-items:flex-end;height:40px;margin-top:8px;}
.mini-bar{flex:1;border-radius:3px 3px 0 0;background:rgba(124,58,237,.3);min-height:3px;}
.mini-bar.active{background:var(--profit);}
@media(min-width:768px){
  .screen{max-width:600px;margin:0 auto;box-shadow:var(--shadow-lg);}
  body{background:#e2e8f0;}
  .sidebar{max-width:280px;}
  .stats-grid{grid-template-columns:1fr 1fr 1fr 1fr;}
  .report-summary{grid-template-columns:1fr 1fr 1fr 1fr;}
  .sale-popup,.success-popup{max-width:440px;}
}
@media(min-width:1024px){
  .screen{max-width:720px;}
  .stats-grid{grid-template-columns:repeat(4,1fr);}
  .form-row{grid-template-columns:1fr 1fr 1fr;}
}
</style>

<script>
// ════════════════════════════════════════════════
//  SUPABASE CONFIG (Badilisha URL na Key yako)
// ════════════════════════════════════════════════
const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_KEY = 'YOUR_ANON_KEY';

const LS = {
  session: 'xyz_session',
  drugs: 'xyz_drugs',
  sales: 'xyz_sales',
  users: 'xyz_users',
  stores: 'xyz_stores',
  pendingSales: 'xyz_pending_sales',
  returns: 'xyz_returns',
  reminders: 'xyz_reminders',
};

let currentUser = null;
let isOnline = navigator.onLine;
let cart = [];
let allDrugs = [];
let allSales = [];
let allUsers = [];
let allStores = [];
let allReturns = [];
let allReminders = [];
let currentPage = 'dashboard';
let _pendingSaleData = null;

// ════════════════════════════════════════════════
//  SUPABASE HELPERS
// ════════════════════════════════════════════════
async function sbFetch(path, options = {}) {
  if (!isOnline) throw new Error('offline');
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...options.headers },
    ...options
  });
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  if (res.status === 204) return null;
  return res.json();
}
async function sbGet(table, query=''){return sbFetch(table+(query?'?'+query:''),{method:'GET'});}
async function sbPost(table,data){return sbFetch(table,{method:'POST',body:JSON.stringify(data)});}

// ════════════════════════════════════════════════
//  SEED DATA
// ════════════════════════════════════════════════
function seedDemoData() {
  if (getLocal(LS.users)) return;
  const users = [
    { id: 'u1', username: 'admin', password: '12345', role: 'superadmin', name: 'Msimamizi Mkuu', storeId: null, phone: '0742417963' },
    { id: 'u2', username: 'mmiliki', password: 'duka123', role: 'owner', name: 'Ahmed Salim', storeId: 's1', phone: '0712345678' },
    { id: 'u3', username: 'muuzaji1', password: 'uza123', role: 'seller', name: 'Fatuma Hassan', storeId: 's1', phone: '0787654321' },
    { id: 'u4', username: 'muuzaji2', password: 'uza456', role: 'seller', name: 'Juma Mwangi', storeId: 's2', phone: '0756789012' },
  ];
  const stores = [
    { id: 's1', name: 'XYZ Pharmacy - Kariakoo', location: 'Kariakoo, Dar es Salaam', ownerId: 'u2' },
    { id: 's2', name: 'XYZ Pharmacy - Mwenge', location: 'Mwenge, Dar es Salaam', ownerId: 'u2' },
  ];
  const drugs = [
    { id: 'd1', name: 'Panadol Extra 500mg', category: 'Maumivu', buyPrice: 900, price: 1500, stock: 150, posStock: 150, unit: 'pakiti', storeId: 's1', minStock: 20, issuedToPos: true },
    { id: 'd2', name: 'Amoxicillin 500mg', category: 'Antibiotiki', buyPrice: 2000, price: 3000, stock: 80, posStock: 80, unit: 'kapsuli', storeId: 's1', minStock: 15, issuedToPos: true },
    { id: 'd3', name: 'ORS Sachet', category: 'Upungufu wa Maji', buyPrice: 300, price: 500, stock: 200, posStock: 200, unit: 'sachet', storeId: 's1', minStock: 30, issuedToPos: true },
    { id: 'd4', name: 'Coartem 24s', category: 'Malaria', buyPrice: 8000, price: 12000, stock: 45, posStock: 45, unit: 'pakiti', storeId: 's1', minStock: 10, issuedToPos: true },
    { id: 'd5', name: 'Metronidazole 400mg', category: 'Antibiotiki', buyPrice: 500, price: 800, stock: 5, posStock: 5, unit: 'kibao', storeId: 's1', minStock: 20, issuedToPos: true },
  ];
  const sales = [];
  for (let i = 0; i < 10; i++) {
    const d = drugs[i % drugs.length];
    const qty = Math.floor(Math.random() * 3) + 1;
    sales.push({
      id: 'sale_' + i, drugId: d.id, drugName: d.name,
      qty, price: d.price, buyPrice: d.buyPrice,
      total: d.price * qty, profit: (d.price - d.buyPrice) * qty,
      storeId: d.storeId, sellerId: 'u3', sellerName: 'Fatuma Hassan',
      date: new Date().toISOString().slice(0,10), time: '10:30',
      synced: true, customerPhone: '0787654321', customerName: 'Mteja',
    });
  }
  saveLocal(LS.users, users);
  saveLocal(LS.stores, stores);
  saveLocal(LS.drugs, drugs);
  saveLocal(LS.sales, sales);
  saveLocal(LS.returns, []);
  saveLocal(LS.pendingSales, []);
  saveLocal(LS.reminders, []);
}

function saveLocal(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {} }
function getLocal(key) { try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : null; } catch(e) { return null; } }

function loadAllData() {
  allUsers = getLocal(LS.users) || [];
  allStores = getLocal(LS.stores) || [];
  allDrugs = getLocal(LS.drugs) || [];
  allSales = getLocal(LS.sales) || [];
  allReturns = getLocal(LS.returns) || [];
  allReminders = getLocal(LS.reminders) || [];
}

// ════════════════════════════════════════════════
//  ONLINE/OFFLINE
// ════════════════════════════════════════════════
window.addEventListener('online', () => { isOnline = true; updateOnlineDot(); showToast('✅ Umeunganika na mtandao!', 'success'); });
window.addEventListener('offline', () => { isOnline = false; updateOnlineDot(); showToast('📡 Huna mtandao — mfumo unaendelea offline', 'warning'); });

function updateOnlineDot() {
  const dot = document.getElementById('online-dot');
  if (dot) { dot.className = 'online-dot' + (isOnline ? '' : ' offline'); }
  const badge = document.getElementById('offline-badge');
  if (badge) badge.style.display = isOnline ? 'none' : 'inline-flex';
  updateSyncIndicator();
}

function updateSyncIndicator() {
  const pending = getLocal(LS.pendingSales) || [];
  const indicator = document.getElementById('sync-indicator');
  if (!indicator) return;
  if (pending.length > 0 && !isOnline) {
    indicator.classList.remove('hidden');
    document.getElementById('pending-count').textContent = pending.length;
  } else { indicator.classList.add('hidden'); }
}

async function syncData() {
  if (!isOnline) { showToast('❌ Hakuna mtandao', 'error'); return; }
  const pending = getLocal(LS.pendingSales) || [];
  if (pending.length === 0) { showToast('✅ Hakuna data inayosubiri', 'success'); return; }
  showToast('⏳ Inatuma data...', 'warning');
  try {
    if (SUPABASE_URL !== 'https://YOUR_PROJECT.supabase.co') {
      for (const sale of pending) { await sbPost('sales', sale); }
    }
    const synced = pending.map(s => ({ ...s, synced: true }));
    const newAll = [...allSales.filter(s => !pending.find(p => p.id === s.id)), ...synced];
    saveLocal(LS.sales, newAll);
    saveLocal(LS.pendingSales, []);
    allSales = newAll;
    updateSyncIndicator();
    showToast(`✅ Mauzo ${pending.length} yametumwa!`, 'success');
    if (currentPage === 'reports') renderReports();
    if (currentPage === 'dashboard') renderDashboard();
  } catch(e) { showToast('❌ Imeshindwa kutuma', 'error'); }
}

// ════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════
function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();
  if (!username || !password) { showToast('⚠️ Ingiza jina na nywila', 'warning'); return; }
  const user = allUsers.find(u => u.username === username && u.password === password);
  if (!user) { showToast('❌ Jina au nywila si sahihi', 'error'); return; }
  currentUser = user;
  saveLocal(LS.session, user);
  showToast(`✅ Karibu, ${user.name}!`, 'success');
  enterApp();
}

function doLogout() {
  saveLocal(LS.session, null);
  currentUser = null;
  cart = [];
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
  closeSidebar();
  showToast('👋 Umetoka mfumoni', 'success');
}

function enterApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('main-screen').classList.add('active');
  setupUI();
  navigateTo('dashboard');
}

// ════════════════════════════════════════════════
//  UI SETUP
// ════════════════════════════════════════════════
function setupUI() {
  if (!currentUser) return;
  const u = currentUser;
  document.getElementById('sb-name').textContent = u.name;
  document.getElementById('sb-role').textContent = roleLabel(u.role);
  document.getElementById('sb-avatar').textContent = u.name.charAt(0).toUpperCase();

  const navItems = getNavItems(u.role);
  document.getElementById('sidebar-nav').innerHTML = navItems.map(sec => `
    <div class="nav-section">
      <div class="nav-section-title">${sec.title}</div>
      ${sec.items.map(item => `<button class="nav-item" onclick="navigateTo('${item.page}');closeSidebar()"><span class="nav-icon">${item.icon}</span> ${item.label}</button>`).join('')}
    </div>`).join('');

  const bnav = getBottomNav(u.role);
  document.getElementById('bottom-nav').innerHTML = bnav.map(item => `
    <button class="bottom-nav-item" id="bnav-${item.page}" onclick="navigateTo('${item.page}')">
      <span class="bnav-icon">${item.icon}</span>
      <span class="bnav-label">${item.label}</span>
    </button>`).join('');

  const store = allStores.find(s => s.id === u.storeId);
  document.getElementById('topbar-sub').textContent = store ? store.name : (u.role === 'superadmin' ? 'Mfumo Wote' : u.name);
  updateOnlineDot();
}

function getNavItems(role) {
  const common = [{ title: 'MSINGI', items: [{ icon: '🏠', label: 'Dashibodi', page: 'dashboard' }]}];

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('bnav-' + page)?.classList.add('active');
  const titles = {
    dashboard: ['Dashibodi', 'Muhtasari wa Mfumo'],
    sell: ['Point of Sale', 'Chagua dawa — Cart — Uza'],
    store: ['Store', 'Hifadhi ya Dawa (Sajili & Toa)'],
    reports: ['Ripoti za Mauzo', 'Angalia mauzo yako'],
    admin: ['Usimamizi', 'Maduka na Watumiaji'],
    returns: ['Rejeshi', 'Dawa zilizorudishwa'],
    reminders: ['Kumbushisho', currentUser?.role==='seller'?'Weka vikumbusho vya wagonjwa':'Ripoti ya vikumbusho'],
  };
  const [t, s] = titles[page] || ['', ''];
  document.getElementById('topbar-title').textContent = t;
  document.getElementById('topbar-sub').textContent = s;
  const renders = { dashboard: renderDashboard, sell: renderSell, store: renderStore, reports: renderReports, admin: renderAdmin, returns: renderReturns, reminders: renderReminders };
  if (renders[page]) renders[page]();
}

function quickRestock(drugId) {
  const drug = allDrugs.find(d => d.id === drugId);
  if (!drug) return;
  openModal(`➕ Ongeza Stoo: ${drug.name}`, `
    <div class="field"><label>Kiasi cha Kuongeza</label><input type="number" id="restock-qty" value="10" min="1"></div>
    <p style="font-size:13px;color:var(--text2);">Stoo ya sasa: ${drug.stock} ${drug.unit}</p>
  `, [
    { label: 'Hifadhi', style: 'primary', action: () => {
      const qty = parseInt(document.getElementById('restock-qty').value) || 0;
      if (qty <= 0) return;
      const idx = allDrugs.findIndex(d => d.id === drugId);
      if (idx >= 0) {
        allDrugs[idx].stock += qty;
        if (allDrugs[idx].issuedToPos) allDrugs[idx].posStock += qty;
        saveLocal(LS.drugs, allDrugs);
        closeModal(); renderDashboard();
        showToast(`✅ Stoo ya ${drug.name} imeongezeka kwa ${qty}`, 'success');
      }
    }},
    { label: 'Ghairi', style: 'outline', action: closeModal }
  ]);
}

  }

  el.innerHTML = `
    <div style="margin-bottom:12px;"><input class="search-input" type="text" id="drug-search" placeholder="🔍 Tafuta dawa (zilizotolewa Store)..." oninput="searchDrugs(this.value)" autocomplete="off"></div>
    <div id="drug-results-list"></div>
    <div id="cart-section"></div>
    <div id="customer-section"></div>
    <div id="sell-action-btns"></div>
  `;
  renderCart();
}

function searchDrugs(query) {
  const el = document.getElementById('drug-results-list');
  const myDrugs = getMyDrugs().filter(d => d.issuedToPos && (d.posStock ?? d.stock) > 0);
  if (!query.trim()) { el.innerHTML = ''; return; }
  const results = myDrugs.filter(d => d.name.toLowerCase().includes(query.toLowerCase()) || d.category.toLowerCase().includes(query.toLowerCase()));
  if (results.length === 0) {
    el.innerHTML = `<div class="empty-state" style="padding:20px;"><p>Hakuna dawa "${query}" — au haijatolewa Store bado</p></div>`;
    return;
  }
  el.innerHTML = `<div class="drug-results">
    ${results.map(d => `
      <div class="drug-result-item" onclick="addToCart('${d.id}')">
        <div class="dri-info"><div class="dri-name">${d.name}</div><div class="dri-detail">${d.category} • ${d.unit}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
          <div class="dri-price">TZS ${fmt(d.price)}</div>
          <div class="dri-stock ${(d.posStock??d.stock)<=d.minStock?'low':''}">Stoo: ${d.posStock??d.stock}</div>
        </div>
      </div>`).join('')}
  </div>`;
}

function addToCart(drugId) {
  const drug = allDrugs.find(d => d.id === drugId);
  if (!drug) return;
  const avail = drug.posStock ?? drug.stock;
  if (avail <= 0) { showToast('❌ Dawa hii imekwisha stoo!', 'error'); return; }
  const existing = cart.find(c => c.drugId === drugId);
  if (existing) {
    if (existing.qty >= avail) { showToast('⚠️ Kiasi kinazidi stoo!', 'warning'); return; }
    existing.qty++;
    existing.total = existing.qty * existing.price;
    existing.profit = existing.qty * (existing.price - (existing.buyPrice||0));
  } else {
    cart.push({ drugId, name: drug.name, price: drug.price, buyPrice: drug.buyPrice||0, qty: 1, total: drug.price, profit: drug.price-(drug.buyPrice||0), unit: drug.unit });
  }
  document.getElementById('drug-search').value = '';
  document.getElementById('drug-results-list').innerHTML = '';
  renderCart();
  showToast(`✅ ${drug.name} imeongezwa`, 'success');
}

function updateQty(drugId, val) {
  const item = cart.find(c => c.drugId === drugId);
  const drug = allDrugs.find(d => d.id === drugId);
  if (!item || !drug) return;
  const qty = parseInt(val) || 0;
  if (qty <= 0) { removeFromCart(drugId); return; }
  const avail = drug.posStock ?? drug.stock;
  if (qty > avail) { showToast('⚠️ Kiasi kinazidi stoo!', 'warning'); return; }
  item.qty = qty;
  item.total = qty * item.price;
  item.profit = qty * (item.price - (item.buyPrice||0));
  renderCart();
}

function removeFromCart(drugId) {
  cart = cart.filter(c => c.drugId !== drugId);
  renderCart();
}

function renderCart() {
  const cartEl = document.getElementById('cart-section');
  const customerEl = document.getElementById('customer-section');
  const actionsEl = document.getElementById('sell-action-btns');
  if (!cartEl) return;
  const total = cart.reduce((a, b) => a + b.total, 0);
  if (cart.length === 0) {
    cartEl.innerHTML = `<div class="empty-state" style="padding:32px 16px;"><div class="es-icon">🛒</div><h3>Kikapu Kiko Tupu</h3><p>Tafuta dawa hapo juu uibofye kuiongeza</p></div>`;
    customerEl.innerHTML = '';
    actionsEl.innerHTML = '';
    return;
  }
  cartEl.innerHTML = `
    <div class="cart-section">
      <h3>🛒 Kikapu (${cart.length} aina) <button class="btn-danger" style="font-size:12px;padding:6px 12px;" onclick="cart=[];renderCart()">Futa Yote</button></h3>
      ${cart.map(item=>`
        <div class="cart-item">
          <div class="cart-item-name"><div style="font-weight:600;">${item.name}</div><div style="font-size:11px;color:var(--text3);">TZS ${fmt(item.price)} × ${item.unit}</div></div>
          <div class="cart-qty-wrap">
            <button class="qty-btn" onclick="updateQty('${item.drugId}',${item.qty-1})">−</button>
            <input class="qty-input" type="number" value="${item.qty}" min="1" onchange="updateQty('${item.drugId}',this.value)">
            <button class="qty-btn" onclick="updateQty('${item.drugId}',${item.qty+1})">+</button>
          </div>
          <div class="cart-item-total">TZS ${fmt(item.total)}</div>
          <button class="cart-remove" onclick="removeFromCart('${item.drugId}')">🗑️</button>
        </div>`).join('')}
      <div class="cart-footer"><div class="cart-total-label">Jumla ya Kulipa</div><div class="cart-total-val">TZS ${fmt(total)}</div></div>
    </div>`;

  customerEl.innerHTML = `
    <div style="background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);">
      <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:12px;">Taarifa za Mteja (Si Lazima)</div>
      <div class="field" style="margin-bottom:10px;"><label>Jina la Mteja</label><input type="text" id="cust-name" placeholder="Mfano: Ali Hassan"></div>
      <div class="field" style="margin-bottom:10px;"><label>Namba ya Simu</label><input type="tel" id="cust-phone" placeholder="07XXXXXXXX"></div>
      <div class="field" style="margin-bottom:0;"><label>Umri</label><input type="text" id="cust-age" placeholder="Mfano: 35 miaka"></div>
    </div>`;

  actionsEl.innerHTML = `
    <div class="sell-actions">
      <button class="btn-primary" onclick="initiateSale(false)">✅ Maliza Mauzo</button>
      <button class="btn-success" onclick="initiateSale(true)">📱 Mauzo + SMS</button>
    </div>`;
}

function initiateSale(sendSMS) {
  if (cart.length === 0) { showToast('⚠️ Kikapu kiko tupu!', 'warning'); return; }
  const custName = document.getElementById('cust-name')?.value.trim() || '';
  const custPhone = document.getElementById('cust-phone')?.value.trim() || '';
  const custAge = document.getElementById('cust-age')?.value.trim() || '';
  if (sendSMS && !custPhone) { showToast('⚠️ Ingiza namba ya simu ya mteja kwa SMS', 'warning'); return; }
  const total = cart.reduce((a, b) => a + b.total, 0);
  _pendingSaleData = { custName, custPhone, custAge, sendSMS };
  document.getElementById('confirm-amount').textContent = `TZS ${fmt(total)}`;
  document.getElementById('confirm-detail').innerHTML = `
    <strong>Dawa zifuatazo:</strong><br>
    ${cart.map(c=>`💊 <b>${c.name}</b> × ${c.qty} &nbsp;= TZS ${fmt(c.total)}`).join('<br>')}
    <br><br>${custName ? `👤 Mteja: <b>${custName}</b><br>` : ''}${custAge ? `🎂 Umri: ${custAge}<br>` : ''}${custPhone ? `📞 Simu: ${custPhone}<br>` : ''}
  `;
  document.getElementById('confirm-yes-btn').onclick = () => {
    document.getElementById('sale-confirm-overlay').classList.remove('open');
    completeSale();
  };
  document.getElementById('sale-confirm-overlay').classList.add('open');
}

function completeSale() {
  if (!_pendingSaleData) return;
  const { custName, custPhone, custAge, sendSMS } = _pendingSaleData;
  _pendingSaleData = null;
  if (cart.length === 0) return;

  const now = new Date();
  const saleGroupId = 'sgrp_' + now.getTime();
  const date = now.toISOString().slice(0, 10);
  const time = now.toTimeString().slice(0, 5);
  const myStoreId = currentUser.storeId || allStores[0]?.id || 's1';
  const sales = [];
  const updatedDrugs = JSON.parse(JSON.stringify(allDrugs));

  for (const item of cart) {
    const drugIdx = updatedDrugs.findIndex(d => d.id === item.drugId);
    if (drugIdx >= 0) {
      const d = updatedDrugs[drugIdx];
      const newPosStock = Math.max(0, (d.posStock ?? d.stock) - item.qty);
      updatedDrugs[drugIdx] = { ...d, posStock: newPosStock, stock: Math.max(0, d.stock - item.qty) };
    }
    const profit = (item.price - (item.buyPrice||0)) * item.qty;
    sales.push({
      id: saleGroupId + '_' + item.drugId, saleGroupId, drugId: item.drugId, drugName: item.name,
      qty: item.qty, price: item.price, buyPrice: item.buyPrice||0, total: item.total, profit,
      storeId: myStoreId, sellerId: currentUser.id, sellerName: currentUser.name,
      date, time, synced: false, customerName: custName, customerPhone: custPhone, customerAge: custAge,
    });
  }

  allDrugs = updatedDrugs;
  saveLocal(LS.drugs, allDrugs);
  const existingSales = getLocal(LS.sales) || [];
  const newIds = new Set(sales.map(s => s.id));
  const deduped = existingSales.filter(s => !newIds.has(s.id));
  const newAllSales = [...deduped, ...sales];
  saveLocal(LS.sales, newAllSales);
  allSales = newAllSales;
  const existingPending = getLocal(LS.pendingSales) || [];
  const dedupedPending = existingPending.filter(s => !newIds.has(s.id));
  saveLocal(LS.pendingSales, [...dedupedPending, ...sales]);
  updateSyncIndicator();

  const totalSale = cart.reduce((a, b) => a + b.total, 0);
  const cartSnapshot = [...cart];
  cart = [];

  if (sendSMS && custPhone) {
    const receipt = buildReceipt(sales, custName, totalSale, date, time);
    setTimeout(() => { window.location.href = `sms:${custPhone}?body=${encodeURIComponent(receipt)}`; }, 500);
  }

  document.getElementById('success-drug-info').textContent = cartSnapshot.length === 1 ? `${cartSnapshot[0].name} × ${cartSnapshot[0].qty}` : `${cartSnapshot.length} aina za dawa`;
  document.getElementById('success-amount').textContent = `TZS ${fmt(totalSale)}`;
  document.getElementById('success-detail').textContent = custName ? `Mteja: ${custName}` : cartSnapshot.map(c => `${c.name} × ${c.qty}`).join(', ');
  document.getElementById('success-popup-overlay').classList.add('open');
  renderSell();
}

function closeSuccessPopup() {
  document.getElementById('success-popup-overlay').classList.remove('open');
  navigateTo('dashboard');
}

function buildReceipt(sales, custName, total, date, time) {
  const store = allStores.find(s => s.id === (currentUser.storeId || sales[0]?.storeId));
  let r = `${store?.name||'XYZ Pharmacy'}\nTarehe: ${date} Saa: ${time}\n`;
  if (custName) r += `Mteja: ${custName}\n`;
  r += `─────────────────\n`;
  for (const s of sales) r += `${s.drugName} x${s.qty} = TZS ${fmt(s.total)}\n`;
  r += `─────────────────\nJUMLA: TZS ${fmt(total)}\nAsante kwa kununua!\n${store?.name||'XYZ Pharmacy'}`;
  return r;
}

function renderDrugList(drugs) {
  if (drugs.length === 0) return `<div class="empty-state"><div class="es-icon">💊</div><h3>Hakuna Dawa</h3><p>Bonyeza + Sajili kuongeza dawa mpya</p></div>`;
  return drugs.map(d => {
    const profit = d.price - (d.buyPrice || 0);
    const margin = d.price > 0 ? Math.round((profit / d.price) * 100) : 0;
    return `
    <div class="drug-card">
      <div class="drug-card-top">
        <div class="drug-card-icon">💊</div>
        <div class="drug-card-info"><div class="drug-card-name">${d.name}</div><div class="drug-card-cat">${d.category}</div></div>
        <div class="drug-card-actions">
          ${d.issuedToPos ? `<span class="issued-badge">✅ POS</span>` : `<button class="issue-btn" onclick="issueDrugToPos('${d.id}')">📤 Toa POS</button>`}
          <button class="icon-btn" onclick="showEditDrugModal('${d.id}')">✏️</button>
          <button class="icon-btn danger" onclick="confirmDeleteDrug('${d.id}')">🗑️</button>
        </div>
      </div>
      <div class="drug-card-stats">
        <div class="drug-stat"><div class="drug-stat-val" style="color:${(d.posStock??d.stock)<=(d.minStock||10)?'var(--danger)':'var(--navy)'};">${d.posStock??d.stock}</div><div class="drug-stat-label">POS Stoo</div></div>
        <div class="drug-stat"><div class="drug-stat-val">${d.stock}</div><div class="drug-stat-label">Store Stoo</div></div>
        <div class="drug-stat"><div class="drug-stat-val">TZS ${fmt(d.buyPrice||0)}</div><div class="drug-stat-label">Bei Nunua</div></div>
        <div class="drug-stat"><div class="drug-stat-val">TZS ${fmt(d.price)}</div><div class="drug-stat-label">Bei Uza</div></div>
        <div class="drug-stat"><div class="drug-stat-val" style="color:var(--profit);">TZS ${fmt(profit)}</div><div class="drug-stat-label">Faida/Kipande</div></div>
        <div class="drug-stat"><div class="drug-stat-val" style="color:var(--profit);">${margin}%</div><div class="drug-stat-label">Margin</div></div>
        <div class="drug-stat"><div class="drug-stat-val">${d.minStock||10}</div><div class="drug-stat-label">Alert</div></div>
        <div class="drug-stat"><div class="drug-stat-val">${d.unit}</div><div class="drug-stat-label">Kipimo</div></div>
      </div>
    </div>`;
  }).join('');
}

function issueDrugToPos(id) {
  const d = allDrugs.find(x => x.id === id);
  if (!d) return;
  openModal('📤 Toa Dawa kwa POS', `
    <p>Toa <strong>${d.name}</strong> kwenda Point of Sale.</p>
    <div class="field"><label>Kiasi cha Kutoa (max: ${d.stock})</label><input type="number" id="issue-qty" value="${d.stock}" min="1" max="${d.stock}"></div>
  `, [
    { label: '📤 Toa', style: 'primary', action: () => {
      const qty = parseInt(document.getElementById('issue-qty')?.value) || 0;
      if (qty <= 0 || qty > d.stock) { showToast('⚠️ Kiasi si sahihi', 'warning'); return; }
      const idx = allDrugs.findIndex(x => x.id === id);
      allDrugs[idx] = { ...allDrugs[idx], issuedToPos: true, posStock: qty };
      saveLocal(LS.drugs, allDrugs);
      closeModal(); renderStore();
      showToast(`✅ ${d.name} imetolewa kwa POS — Kiasi: ${qty}`, 'success');
    }},
    { label: 'Hapana', style: 'outline', action: closeModal }
  ]);
}

function filterDrugs(query) {
  const myDrugs = getMyDrugs();
  const filtered = myDrugs.filter(d => d.name.toLowerCase().includes(query.toLowerCase()) || d.category.toLowerCase().includes(query.toLowerCase()));
  document.getElementById('drug-list').innerHTML = renderDrugList(filtered);
}

function filterByCategory(cat, btn) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const myDrugs = getMyDrugs();
  let filtered = myDrugs;
  if (cat === '__issued') filtered = myDrugs.filter(d => d.issuedToPos);
  else if (cat === '__notissued') filtered = myDrugs.filter(d => !d.issuedToPos);
  else if (cat) filtered = myDrugs.filter(d => d.category === cat);
  document.getElementById('drug-list').innerHTML = renderDrugList(filtered);
}

function saveDrug(isEdit = false) {
  const name = document.getElementById('f-dname')?.value.trim();
  const cat = document.getElementById('f-dcat')?.value.trim();
  const unit = document.getElementById('f-dunit')?.value.trim();
  const buyPrice = parseFloat(document.getElementById('f-dbuyprice')?.value)||0;
  const price = parseFloat(document.getElementById('f-dprice')?.value)||0;
  const stock = parseInt(document.getElementById('f-dstock')?.value)||0;
  const minStock = parseInt(document.getElementById('f-dmin')?.value)||10;
  const storeId = document.getElementById('f-dstore')?.value;
  if (!name || !cat || !unit) { showToast('⚠️ Jaza sehemu zote muhimu', 'warning'); return; }
  if (isEdit) {
    const id = document.getElementById('f-dedit-id')?.value;
    const idx = allDrugs.findIndex(d => d.id === id);
    if (idx >= 0) allDrugs[idx] = { ...allDrugs[idx], name, category: cat, unit, buyPrice, price, stock, minStock };
    showToast('✅ Dawa imebadilishwa!', 'success');
  } else {
    allDrugs.push({ id: 'drug_' + Date.now(), name, category: cat, unit, buyPrice, price, stock, posStock: 0, minStock, storeId, issuedToPos: false });
    showToast('✅ Dawa mpya imesajiliwa!', 'success');
  }
  saveLocal(LS.drugs, allDrugs);
  closeModal();
  renderStore();
}

function confirmDeleteDrug(id) {

}

function exportDrugsCSV() {
  const myDrugs = getMyDrugs();
  const header = 'Jina,Category,Kipimo,Bei_Nunua,Bei_Uza,Kiasi_Store,Kiasi_POS,Alert\n';
  const rows = myDrugs.map(d => `"${d.name}","${d.category}","${d.unit}",${d.buyPrice||0},${d.price},${d.stock},${d.posStock??d.stock},${d.minStock||10}`).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `dawa_export_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('📥 Export imefanikiwa!', 'success');
}

function importDrugsCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const text = e.target.result;
      const lines = text.trim().split('\n').slice(1);
      let added = 0;
      const myStoreId = currentUser.storeId || allStores[0]?.id || 's1';
      for (const line of lines) {
        const cols = line.split(',').map(c => c.replace(/^"|"$/g,'').trim());
        if (!cols[0]) continue;
        allDrugs.push({
          id: 'drug_imp_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
          name: cols[0], category: cols[1]||'Jumla', unit: cols[2]||'kipande',
          buyPrice: parseFloat(cols[3])||0, price: parseFloat(cols[4])||0,
          stock: parseInt(cols[5])||0, posStock: parseInt(cols[6])||0,
          minStock: parseInt(cols[7])||10, storeId: myStoreId, issuedToPos: false,
        });
        added++;
      }
      saveLocal(LS.drugs, allDrugs);
      renderStore();
      showToast(`✅ Dawa ${added} zimeingizwa! Bonyeza "Toa POS" kuzifanya ziuane.`, 'success');
    } catch(err) { showToast('❌ Hitilafu katika faili la CSV', 'error'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function doBackup() {
  const backupData = { version: '3.2', timestamp: new Date().toISOString(), users: allUsers, stores: allStores, drugs: allDrugs, sales: allSales, returns: allReturns, reminders: allReminders };
  const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `xyz_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('💾 Backup imeshuka!', 'success');
}

function doRestore(event) {
  const file = event.target.files[0];
  if (!file) return;
  openModal('♻️ Thibitisha Restore', `<p style="color:var(--danger);"><strong>Tahadhari!</strong> Hii itafuta data zako za sasa na kurejesha data kutoka faili.</p>`, [
    { label: 'Ndio, Restore', style: 'danger', action: () => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.users) { saveLocal(LS.users, data.users); allUsers = data.users; }
          if (data.stores) { saveLocal(LS.stores, data.stores); allStores = data.stores; }
          if (data.drugs) { saveLocal(LS.drugs, data.drugs); allDrugs = data.drugs; }
          if (data.sales) { saveLocal(LS.sales, data.sales); allSales = data.sales; }
          closeModal(); renderStore();
          showToast('✅ Restore imefanikiwa!', 'success');
        } catch(err) { showToast('❌ Faili si sahihi', 'error'); }
      };
      reader.readAsText(file);
      event.target.value = '';
    }},
    { label: 'Hapana', style: 'outline', action: () => { closeModal(); event.target.value = ''; } }
  ]);
}

          <div class="re-amount">TZS ${fmt(s.total)}</div>

function sendFullReportSMS() {
  const u = currentUser;
  const myStoreId = u.storeId;
  const store = allStores.find(s => s.id === myStoreId) || allStores[0];
  const owner = allUsers.find(u => u.id === store?.ownerId);
  const ownerPhone = owner?.phone || '0742417963';
  const today = new Date().toISOString().slice(0,10);
  const mySales = allSales.filter(s => s.storeId === myStoreId && s.sellerId === u.id);
  const todaySales = mySales.filter(s => s.date === today);
  const totalToday = todaySales.reduce((a,b)=>a+b.total,0);
  const weekSales = mySales.filter(s => {
    const d = new Date(s.date); const now = new Date();
    const diff = (now - d) / (1000*60*60*24);
    return diff <= 7;
  }).reduce((a,b)=>a+b.total,0);
  const monthSales = mySales.filter(s => s.date.slice(0,7) === today.slice(0,7)).reduce((a,b)=>a+b.total,0);
  const returns = allReturns.filter(r => r.storeId === myStoreId);
  const returnTotal = returns.reduce((a,b)=>a+b.total,0);
  const reminders = allReminders.filter(r => r.storeId === myStoreId);
  const lowStock = allDrugs.filter(d => d.storeId === myStoreId && (d.posStock??d.stock) <= (d.minStock||10));
  const topDrugs = {};
  mySales.forEach(s => { topDrugs[s.drugName] = (topDrugs[s.drugName]||0) + s.qty; });
  const topList = Object.entries(topDrugs).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([n,q])=>`${n}: ${q}`).join('\n');
  const msg = `RIPOTI YA MUUZAJI\n${store.name}\n${u.name}\n────────────\n📊 MAUZO\nLeo: TZS ${fmt(totalToday)}\nWiki: TZS ${fmt(weekSales)}\nMwezi: TZS ${fmt(monthSales)}\n────────────\n↩️ REJESHI\nIdadi: ${returns.length}\nThamani: TZS ${fmt(returnTotal)}\n────────────\n🔔 KUMBUSHO\nWateja: ${reminders.length}\n────────────\n⚠️ DAWA CHACHE\n${lowStock.length} aina\n────────────\n🔥 ZINAZOUZWA SANA\n${topList}\n────────────\nXYZ Pharmacy`;
  openModal('📱 Tuma Ripoti kwa Mmiliki', `
    <div class="field"><label>Namba ya Mmiliki</label><input type="tel" id="sms-phone" value="${ownerPhone}"></div>
    <div class="receipt-preview">${msg.replace(/\n/g,'<br>')}</div>
  `, [{ label: '📱 Tuma SMS', style: 'primary', action: () => {
    const ph = document.getElementById('sms-phone').value.trim();
    if (!ph) { showToast('⚠️ Ingiza namba', 'warning'); return; }
    window.location.href = `sms:${ph}?body=${encodeURIComponent(msg)}`;
    closeModal();
  }}]);
}

  const salesWithPhone = allSales.filter(s => s.storeId === myStoreId && s.customerPhone);
  openModal('↩️ Rejeshi la Dawa', `
    <div class="field"><label>Chagua Muamala wa Mauzo</label>
      <select id="ret-sale">
        <option value="">-- Chagua --</option>
        ${salesWithPhone.map(s => `<option value="${s.id}">${s.drugName} - ${s.qty} - ${s.customerPhone} - ${s.date}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Idadi Inayorudishwa</label><input type="number" id="ret-qty" min="1" value="1"></div>
    <div class="field"><label>Sababu</label>
      <select id="ret-reason">
        <option>Dawa mbaya / Imeharirika</option><option>Imepewa makosa</option><option>Mteja alibadilisha akili</option><option>Dawa ya ziada</option><option>Nyingine</option>
      </select>
    </div>
  `, [{ label: 'Hifadhi Rejeshi', style: 'primary', action: saveReturn }]);
}

function saveReturn() {
  const saleId = document.getElementById('ret-sale')?.value;
  const qty = parseInt(document.getElementById('ret-qty')?.value)||0;
  const reason = document.getElementById('ret-reason')?.value;
  if (!saleId) { showToast('⚠️ Chagua muamala', 'warning'); return; }
  const sale = allSales.find(s => s.id === saleId);
  if (!sale) return;
  if (qty <= 0 || qty > sale.qty) { showToast('⚠️ Idadi si sahihi', 'warning'); return; }

  const returnEntry = {
    id: 'ret_' + Date.now(),
    drugId: sale.drugId, drugName: sale.drugName,
    qty, price: sale.price, total: sale.price * qty,
    reason, storeId: sale.storeId,
    sellerId: currentUser.id, sellerName: currentUser.name,
    date: new Date().toISOString().slice(0,10), time: new Date().toTimeString().slice(0,5),
    customerName: sale.customerName, customerPhone: sale.customerPhone,
  };
  allReturns.push(returnEntry);
  saveLocal(LS.returns, allReturns);

  // Restore stock
  const drugIdx = allDrugs.findIndex(d => d.id === sale.drugId);
  if (drugIdx >= 0) {
    allDrugs[drugIdx].stock += qty;
    allDrugs[drugIdx].posStock += qty;
    saveLocal(LS.drugs, allDrugs);
  }

  // Update sale
  if (sale.qty === qty) {
    allSales = allSales.filter(s => s.id !== saleId);
  } else {
    const idx = allSales.findIndex(s => s.id === saleId);
    allSales[idx].qty -= qty;
    allSales[idx].total = allSales[idx].qty * allSales[idx].price;
    allSales[idx].profit = allSales[idx].qty * (allSales[idx].price - allSales[idx].buyPrice);
  }
  saveLocal(LS.sales, allSales);

  closeModal();
  showToast(`✅ Rejeshi la ${sale.drugName} limehifadhiwa`, 'success');
  renderReturns();
}

// ════════════════════════════════════════════════
//  REMINDERS (Seller: add/view; Owner/Admin: report)
// ════════════════════════════════════════════════
function renderReminders() {
  const el = document.getElementById('reminder-container');
  const u = currentUser;
  const myStoreId = u.storeId;

  if (u.role === 'seller') {
    const myReminders = allReminders.filter(r => r.sellerId === u.id);
    el.innerHTML = `
      <div style="padding:16px;">
        <button class="btn-add" style="width:100%;margin-bottom:16px;" onclick="showAddReminderModal()"><span>+</span> Kumbushisho Jipya</button>
        <div class="recent-card">
          <h3>🔔 Vikumbusho Vyangu (${myReminders.length})</h3>
          ${myReminders.length===0 ? '<div class="empty-state"><p>Hakuna vikumbusho bado</p></div>' :
            myReminders.map(r=>`
            <div class="admin-item">
              <div class="admin-item-avatar" style="background:var(--warning);">🔔</div>
              <div class="admin-item-info">
                <div class="admin-item-name">${r.patientName}</div>
                <div class="admin-item-sub">💊 ${r.drugName} • 📞 ${r.phone}</div>
                <div class="admin-item-sub">${r.instructions} • ${r.date}</div>
              </div>
              <div class="admin-item-actions">
                <button class="icon-btn" onclick="sendReminderSMS('${r.id}')">📱</button>
                <button class="icon-btn danger" onclick="deleteReminder('${r.id}')">🗑️</button>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  } else {
    // Owner / Admin: report
    const storeReminders = u.role === 'superadmin' ? allReminders : allReminders.filter(r => r.storeId === myStoreId);
    const customersWithPhone = new Set(allSales.filter(s => (u.role==='superadmin'||s.storeId===myStoreId) && s.customerPhone).map(s => s.customerPhone)).size;
    const remindedCount = new Set(storeReminders.map(r => r.phone)).size;
    const percentage = customersWithPhone > 0 ? Math.round((remindedCount / customersWithPhone) * 100) : 0;
    el.innerHTML = `
      <div style="padding:16px;">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${customersWithPhone}</div><div class="stat-label">Wateja Wote</div></div>
          <div class="stat-card"><div class="stat-icon">🔔</div><div class="stat-value">${remindedCount}</div><div class="stat-label">Waliokumbushwa</div></div>
          <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-value">${percentage}%</div><div class="stat-label">Asilimia</div></div>
        </div>
        <div class="recent-card">
          <h3>📋 Vikumbusho vya Hivi Karibuni</h3>
          ${storeReminders.slice(-5).reverse().map(r=>`
            <div class="admin-item">
              <div class="admin-item-avatar" style="background:var(--accent);">🔔</div>
              <div class="admin-item-info"><div class="admin-item-name">${r.patientName}</div><div class="admin-item-sub">${r.drugName} • ${r.date}</div></div>
            </div>`).join('') || '<div class="empty-state"><p>Hakuna vikumbusho</p></div>'}
        </div>
      </div>`;
  }
}

function showAddReminderModal() {
  const myDrugs = getMyDrugs();
  openModal('🔔 Ongeza Kumbushisho', `
    <div class="field"><label>Jina la Mgonjwa</label><input type="text" id="rem-name"></div>
    <div class="field"><label>Namba ya Simu</label><input type="tel" id="rem-phone"></div>
    <div class="field"><label>Dawa</label><select id="rem-drug">${myDrugs.map(d=>`<option>${d.name}</option>`).join('')}</select></div>
    <div class="field"><label>Maelekezo</label><textarea id="rem-instr"></textarea></div>
    <div class="field"><label>Tarehe</label><input type="date" id="rem-date" value="${new Date().toISOString().slice(0,10)}"></div>
  `, [{ label: 'Hifadhi', style: 'primary', action: saveReminder }]);
}

function saveReminder() {
  const name = document.getElementById('rem-name').value.trim();
  const phone = document.getElementById('rem-phone').value.trim();
  const drug = document.getElementById('rem-drug').value;
  const instr = document.getElementById('rem-instr').value.trim();
  const date = document.getElementById('rem-date').value;
  if (!name||!phone||!drug) { showToast('⚠️ Jaza sehemu zote', 'warning'); return; }
  allReminders.push({
    id: 'rem_'+Date.now(),
    patientName: name, phone, drugName: drug,
    instructions: instr||'Kunywa kama ilivyoagizwa',
    date, storeId: currentUser.storeId,
    sellerId: currentUser.id, sent: false,
  });
  saveLocal(LS.reminders, allReminders);
  closeModal();
  showToast('✅ Kumbushisho limehifadhiwa', 'success');
  renderReminders();
}

function sendReminderSMS(id) {
  const r = allReminders.find(x => x.id === id);
  if (!r) return;
  const store = allStores.find(s=>s.id===currentUser.storeId)||allStores[0];
  const msg = `Kumbushisho la Dawa\nMgonjwa: ${r.patientName}\nDawa: ${r.drugName}\nMaelekezo: ${r.instructions}\nTarehe: ${r.date}\n- ${store?.name||'XYZ Pharmacy'}`;
  window.location.href = `sms:${r.phone}?body=${encodeURIComponent(msg)}`;
  r.sent = true;
  saveLocal(LS.reminders, allReminders);
  renderReminders();
}

function deleteReminder(id) {
  allReminders = allReminders.filter(r => r.id !== id);
  saveLocal(LS.reminders, allReminders);
  renderReminders();
  showToast('🗑️ Kumbushisho limefutwa', 'success');
}

// ════════════════════════════════════════════════
//  ADMIN PAGE (Superadmin full CRUD, Owner edit sellers)
// ════════════════════════════════════════════════
function renderAdmin() {
  const el = document.getElementById('admin-container');
  const u = currentUser;
  if (u.role === 'superadmin') {
    el.innerHTML = `
      <div class="admin-section">
        <div class="admin-section-header"><h3>🏪 Maduka</h3><button class="btn-add" onclick="showAddStoreModal()">+ Duka</button></div>
        ${allStores.map(s=>`
          <div class="admin-item">
            <div class="admin-item-avatar" style="background:var(--navy);">🏪</div>
            <div class="admin-item-info"><div class="admin-item-name">${s.name}</div><div class="admin-item-sub">${s.location}</div></div>
            <div class="admin-item-actions">
              <button class="icon-btn" onclick="editStore('${s.id}')">✏️</button>
              <button class="icon-btn danger" onclick="deleteStore('${s.id}')">🗑️</button>
            </div>
          </div>`).join('')}
      </div>
      <div class="admin-section">
        <div class="admin-section-header"><h3>👥 Watumiaji Wote</h3><button class="btn-add" onclick="showAddUserModal()">+ Mtumiaji</button></div>
        ${allUsers.filter(u=>u.role!=='superadmin').map(user=>`
          <div class="admin-item">
            <div class="admin-item-avatar" style="background:${user.role==='owner'?'var(--warning)':'var(--accent)'};">${user.name.charAt(0)}</div>
            <div class="admin-item-info"><div class="admin-item-name">${user.name} (${user.role})</div><div class="admin-item-sub">${user.username} • ${user.phone||''}</div></div>
            <div class="admin-item-actions">
              <button class="icon-btn" onclick="editUser('${user.id}')">✏️</button>
              <button class="icon-btn danger" onclick="deleteUser('${user.id}')">🗑️</button>
            </div>
          </div>`).join('')}
      </div>`;
  } else if (u.role === 'owner') {
    const mySellers = allUsers.filter(user => user.storeId === u.storeId && user.role === 'seller');
    el.innerHTML = `
      <div class="admin-section">
        <div class="admin-section-header"><h3>👥 Wauzaji Wangu</h3><button class="btn-add" onclick="showAddUserModal()">+ Muuzaji</button></div>
        ${mySellers.map(seller=>`
          <div class="admin-item">
            <div class="admin-item-avatar" style="background:var(--accent);">${seller.name.charAt(0)}</div>
            <div class="admin-item-info"><div class="admin-item-name">${seller.name}</div><div class="admin-item-sub">${seller.username} • ${seller.phone||''}</div></div>
            <div class="admin-item-actions">
              <button class="icon-btn" onclick="editUser('${seller.id}')">✏️</button>
              <button class="icon-btn danger" onclick="deleteUser('${seller.id}')">🗑️</button>
            </div>
          </div>`).join('')}
      </div>`;
  } else { el.innerHTML = `<div class="empty-state"><div class="es-icon">🚫</div><h3>Huna Ruhusa</h3></div>`; }
}

function showAddStoreModal() {
  openModal('🏪 Ongeza Duka', `
    <div class="field"><label>Jina</label><input id="f-sname"></div>
    <div class="field"><label>Mahali</label><input id="f-sloc"></div>
    <div class="field"><label>Mmiliki</label><select id="f-sowner">${allUsers.filter(u=>u.role==='owner').map(o=>`<option value="${o.id}">${o.name}</option>`).join('')}</select></div>
  `, [{ label: 'Hifadhi', style: 'primary', action: () => {
    const name = document.getElementById('f-sname').value.trim();
    const loc = document.getElementById('f-sloc').value.trim();
    const ownerId = document.getElementById('f-sowner').value;
    if (!name||!loc) return;
    allStores.push({ id:'store_'+Date.now(), name, location:loc, ownerId });
    saveLocal(LS.stores, allStores);
    closeModal(); renderAdmin();
    showToast('✅ Duka limeongezwa!', 'success');
  }}]);
}

function editStore(id) {
  const s = allStores.find(x=>x.id===id); if(!s) return;
  openModal('✏️ Hariri Duka', `
    <div class="field"><label>Jina</label><input id="f-sname" value="${s.name}"></div>
    <div class="field"><label>Mahali</label><input id="f-sloc" value="${s.location}"></div>
    <input type="hidden" id="f-sid" value="${s.id}">
  `, [{ label: 'Hifadhi', style: 'primary', action: () => {
    const name = document.getElementById('f-sname').value.trim();
    const loc = document.getElementById('f-sloc').value.trim();
    const idx = allStores.findIndex(x=>x.id===id);
    if(idx>=0) allStores[idx] = {...allStores[idx], name, location:loc};
    saveLocal(LS.stores, allStores);
    closeModal(); renderAdmin();
    showToast('✅ Duka limebadilishwa!', 'success');
  }}]);
}

function deleteStore(id) {
  openModal('🗑️ Futa Duka', `<p>Una uhakika?</p>`, [
    { label: 'Ndio', style: 'danger', action: () => {
      allStores = allStores.filter(x=>x.id!==id);
      saveLocal(LS.stores, allStores);
      closeModal(); renderAdmin();
      showToast('🗑️ Duka limefutwa', 'success');
    }},
    { label: 'Hapana', style: 'outline', action: closeModal }
  ]);
}

function showAddUserModal() {
  const isOwner = currentUser.role === 'owner';
  const stores = isOwner ? allStores.filter(s=>s.id===currentUser.storeId) : allStores;
  openModal('👤 Ongeza Mtumiaji', `
    <div class="field"><label>Jina</label><input id="f-uname"></div>
    <div class="field"><label>Username</label><input id="f-uuser"></div>
    <div class="field"><label>Nywila</label><input type="password" id="f-upass"></div>
    <div class="field"><label>Simu</label><input id="f-uphone"></div>
    ${!isOwner ? `<div class="field"><label>Cheo</label><select id="f-urole"><option value="owner">Mmiliki</option><option value="seller">Muuzaji</option></select></div>` : `<input type="hidden" id="f-urole" value="seller">`}
    <div class="field"><label>Duka</label><select id="f-ustore">${stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
  `, [{ label: 'Ongeza', style: 'primary', action: () => {
    const name = document.getElementById('f-uname').value.trim();
    const username = document.getElementById('f-uuser').value.trim().toLowerCase();
    const password = document.getElementById('f-upass').value.trim();
    const phone = document.getElementById('f-uphone').value.trim();
    const role = document.getElementById('f-urole').value;
    const storeId = document.getElementById('f-ustore').value;
    if (!name||!username||!password) { showToast('⚠️ Jaza sehemu zote', 'warning'); return; }
    allUsers.push({ id:'user_'+Date.now(), name, username, password, phone, role, storeId });
    saveLocal(LS.users, allUsers);
    closeModal(); renderAdmin();
    showToast('✅ Mtumiaji ameongezwa!', 'success');
  }}]);
}

function editUser(id) {
  const u = allUsers.find(x=>x.id===id); if(!u) return;
  openModal('✏️ Hariri Mtumiaji', `
    <div class="field"><label>Jina</label><input id="f-uname" value="${u.name}"></div>
    <div class="field"><label>Username</label><input id="f-uuser" value="${u.username}"></div>
    <div class="field"><label>Nywila Mpya (acha tupu)</label><input type="password" id="f-upass"></div>
    <div class="field"><label>Simu</label><input id="f-uphone" value="${u.phone||''}"></div>
    <input type="hidden" id="f-uid" value="${u.id}">
  `, [{ label: 'Hifadhi', style: 'primary', action: () => {
    const name = document.getElementById('f-uname').value.trim();
    const username = document.getElementById('f-uuser').value.trim().toLowerCase();
    const password = document.getElementById('f-upass').value.trim();
    const phone = document.getElementById('f-uphone').value.trim();
    const idx = allUsers.findIndex(x=>x.id===id);
    if(idx>=0) {
      allUsers[idx] = {...allUsers[idx], name, username, phone};
      if(password) allUsers[idx].password = password;
    }
    saveLocal(LS.users, allUsers);
    closeModal(); renderAdmin();
    showToast('✅ Mtumiaji amebadilishwa!', 'success');
  }}]);
}

function deleteUser(id) {
  openModal('🗑️ Futa Mtumiaji', `<p>Una uhakika?</p>`, [
    { label: 'Ndio', style: 'danger', action: () => {
      allUsers = allUsers.filter(x=>x.id!==id);
      saveLocal(LS.users, allUsers);
      closeModal(); renderAdmin();
      showToast('🗑️ Mtumiaji amefutwa', 'success');
    }},
    { label: 'Hapana', style: 'outline', action: closeModal }
  ]);
}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function getMyStores() {
  if (!currentUser) return [];
  if (currentUser.role === 'superadmin') return allStores.map(s=>s.id);
  if (currentUser.role === 'owner') return allStores.filter(s=>s.ownerId===currentUser.id||s.id===currentUser.storeId).map(s=>s.id);
  return [currentUser.storeId].filter(Boolean);
}

function getMyDrugs() {
  const stores = getMyStores();
  return allDrugs.filter(d => stores.includes(d.storeId) || currentUser.role === 'superadmin');
}

function fmt(n) { return new Intl.NumberFormat('sw-TZ').format(Math.round(n||0)); }

function openModal(title, body, buttons=[]) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const footer = document.getElementById('modal-footer');
  footer.innerHTML = buttons.map((b,i)=>`<button style="background:${b.style==='primary'?'var(--navy)':b.style==='danger'?'var(--danger)':'var(--surface2)'};color:${b.style==='outline'?'var(--navy)':'#fff'};border-radius:12px;padding:14px;flex:1;font-weight:700;cursor:pointer;" onclick="modalActions[${i}]()">${b.label}</button>`).join('');
  window.modalActions = buttons.map(b=>b.action);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function showToast(msg, type='default') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3200);
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

//  INIT + SERVICE WORKER
// ════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  seedDemoData();
  loadAllData();
  const savedSession = getLocal(LS.session);
  setTimeout(() => {
    const loader = document.getElementById('app-loader');
    loader.style.opacity = '0';
    setTimeout(() => { loader.style.display = 'none'; }, 500);
    if (savedSession && savedSession.id) {
      currentUser = savedSession;
      const freshUser = allUsers.find(u => u.id === savedSession.id);
      if (freshUser) currentUser = freshUser;
      document.getElementById('login-screen').classList.remove('active');
      document.getElementById('main-screen').classList.add('active');
      setupUI();
      navigateTo('dashboard');
    } else {
      document.getElementById('login-screen').classList.add('active');
    }
    updateOnlineDot();
  }, 1800);

  // Register Service Worker for PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/xyz-pharmacy/service-worker.js')
        .then(reg => console.log('Service Worker imesajiliwa:', reg.scope))
        .catch(err => console.log('Service Worker imeshindwa:', err));
    });
  }
});
